name: Build ESXi ISO (Cloud Only)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0" # 每周日 UTC 0点 执行

jobs:
  build:
    runs-on: windows-latest
    env:
      OD_CLIENT_ID: ${{ secrets.OD_CLIENT_ID }}
      OD_CLIENT_SECRET: ${{ secrets.OD_CLIENT_SECRET }}
      OD_TENANT_ID: ${{ secrets.OD_TENANT_ID }}
      OD_REFRESH_TOKEN: ${{ secrets.OD_REFRESH_TOKEN }}
      # SHARED_LINK 已移除，改用直接路径 ESXi-Custom-ISO

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.AUTH_PAT }}

    # 1. 关键步骤：使用 setup-python 确保指定版本被下载并解压到 hostedtoolcache
    - name: Ensure Python 3.12.10 Exists
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.10'
        architecture: 'x64'
        # Action 会自动把 Python 安装到 C:\hostedtoolcache\windows\Python\3.12.10\x64

    # 2. 安装模块 (直接使用验证过的绝对硬路径)
    - name: Install Python Modules
      shell: pwsh
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        Write-Host "=== Install Python Modules ==="
        
        # 使用经过验证的绝对物理路径，避开 Runner 的 Shim 陷阱
        $pythonPath = "C:\hostedtoolcache\windows\Python\3.12.10\x64\python.exe"
        Write-Host "Using Verified Hardcoded Path: $pythonPath"
        
        # 双重检查：确保文件真的在那里
        if (-not (Test-Path $pythonPath)) {
            Write-Error "CRITICAL: The verified path does not exist! setup-python failed to populate cache?"
            exit 1
        }

        & $pythonPath --version
        & $pythonPath -m pip install --upgrade pip
        # 安装 PowerCLI 依赖的特定库
        & $pythonPath -m pip install six lxml psutil pyopenssl
        
        # 验证模块加载（确保 DLL 路径正确）
        & $pythonPath -c "import six; import lxml; import psutil; import OpenSSL; print('Python environment sanity check passed')"
        
        "PYTHON_PATH=$pythonPath" >> $env:GITHUB_ENV

    # 3. 安装 PowerCLI
    - name: Install VMware PowerCLI
      shell: pwsh
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        Write-Host "=== Install VMware PowerCLI ==="
        Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
        Install-Module -Name VMware.PowerCLI -Scope CurrentUser -Force -AllowClobber
        Get-Module -ListAvailable VMware.PowerCLI | Select-Object Name, Version

    # 4. 配置 PowerCLI (关键：传入绝对物理路径)
    - name: Configure PowerCLI
      shell: pwsh
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        Write-Host "=== Configure PowerCLI ==="
        
        $pythonPath = $env:PYTHON_PATH
        Write-Host "Configuring PowerCLI to use physical executable: $pythonPath"
        
        # 这里必须是物理路径，ImageBuilder 才能找到同目录下的 DLL
        Set-PowerCLIConfiguration -Scope User -ParticipateInCEIP $false -PythonPath $pythonPath -Confirm:$false
        Get-PowerCLIConfiguration

    # 5. 测试 ImageBuilder (验证一切是否正常)
    - name: Test PowerCLI ImageBuilder
      shell: pwsh
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        Write-Host "=== Test ImageBuilder Load ==="
        # 如果路径不对或 DLL 加载失败，这里会直接报错中断
        Import-Module VMware.ImageBuilder -ErrorAction Stop
        Write-Host "✅ ImageBuilder loaded successfully!"

    # 步骤一：获取驱动信息（已更新为 Refresh Token 模式）
    - name: Get Drive Information
      shell: pwsh
      id: get_drive_info
      run: |
        Write-Host "=== 获取 OneDrive 驱动信息 ==="
        
        # 使用 Refresh Token 获取 Access Token
        $tokenUrl = "https://login.microsoftonline.com/$env:OD_TENANT_ID/oauth2/v2.0/token"
        $body = @{
            client_id     = $env:OD_CLIENT_ID
            client_secret = $env:OD_CLIENT_SECRET
            refresh_token = $env:OD_REFRESH_TOKEN
            grant_type    = "refresh_token"
        }
        
        Write-Host "正在刷新访问令牌..."
        try {
            $tokenResponse = Invoke-RestMethod -Method Post -Uri $tokenUrl -Body $body -ContentType "application/x-www-form-urlencoded"
            $token = ($tokenResponse.access_token).Trim()
            
            if ([string]::IsNullOrEmpty($token)) { throw "获取到的访问令牌为空" }
            Write-Host "✓ 访问令牌刷新成功"
        } catch {
            Write-Error "刷新访问令牌失败: $_"
            throw
        }
        
        # 直接获取当前用户的 Drive ID
        Write-Host "正在获取 Drive ID..."
        try {
            $headers = @{ Authorization = "Bearer $token" }
            # 获取 /me/drive 信息
            $driveInfo = Invoke-RestMethod -Uri "https://graph.microsoft.com/v1.0/me/drive" -Headers $headers -Method GET
            
            $driveId = $driveInfo.id
            # 硬编码文件夹名，因为你确认它已存在
            $folderName = "ESXi-Custom-ISO"
            
            Write-Host "✓ 驱动信息获取成功:"
            Write-Host "  - Drive ID: $driveId"
            Write-Host "  - 目标文件夹: $folderName"
            
            "driveId=$driveId" >> $env:GITHUB_OUTPUT
            "folderName=$folderName" >> $env:GITHUB_OUTPUT
            
        } catch {
            Write-Error "获取驱动信息失败: $_"
            throw
        }

    # 步骤二：下载文件（已更新为 Refresh Token 模式）
    - name: Download ESXi Depot Files
      shell: pwsh
      run: |
        Write-Host "=== 下载 ESXi Depot 文件 ==="
        
        # 1. 获取 Token
        $tokenUrl = "https://login.microsoftonline.com/$env:OD_TENANT_ID/oauth2/v2.0/token"
        $body = @{
            client_id     = $env:OD_CLIENT_ID
            client_secret = $env:OD_CLIENT_SECRET
            refresh_token = $env:OD_REFRESH_TOKEN
            grant_type    = "refresh_token"
        }
        $tokenResponse = Invoke-RestMethod -Method Post -Uri $tokenUrl -Body $body -ContentType "application/x-www-form-urlencoded"
        $token = ($tokenResponse.access_token).Trim()
        
        $TEMP_DIR = Join-Path $env:TEMP "depots"
        New-Item -ItemType Directory -Path $TEMP_DIR -Force | Out-Null
        
        $files = @(
            "VMware-ESXi-8.0U3b-24280767-depot.zip",
            "nvme-community-driver_1.0.1.0-3vmw.700.1.0.15843807-component-18902434.zip",
            "VMware-Re-Driver_1.101.01-5vmw.800.1.0.20613240.zip",
            "ESXi800-VMKUSB-NIC-FLING-64098182-component-21668107.zip",
            "ESXi803-VMKUSB-NIC-FLING-76444229-component-24179899.zip",
            "ESXi80U1-VMKUSB-NIC-FLING-64098092-component-21669994.zip",
            "ESXi80U2-VMKUSB-NIC-FLING-67561870-component-22416446.zip",
            "ESXi80U3-VMKUSB-NIC-FLING-75399077-component-24052746.zip"
        )
        
        $headers = @{ Authorization = "Bearer $token" }
        $successCount = 0
        $driveId = "${{ steps.get_drive_info.outputs.driveId }}"
        $folderName = "${{ steps.get_drive_info.outputs.folderName }}"
        
        foreach ($file in $files) {
            # 直接使用路径定位：/drives/{id}/root:/{folder}/{file}:/content
            $downloadUrl = "https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${folderName}/${file}:/content"
            $outFile = Join-Path $TEMP_DIR $file
            
            Write-Host "下载: $file"
            try {
                Invoke-RestMethod -Method GET -Uri $downloadUrl -Headers $headers -OutFile $outFile
                
                if (Test-Path $outFile) {
                    $fileSize = (Get-Item $outFile).Length / 1MB
                    $successCount++
                    Write-Host "✓ $file ($([math]::Round($fileSize, 2)) MB)"
                }
            } catch {
                Write-Host "✗ $file - $($_.Exception.Message)"
                # 可选：打印详细错误以便调试
                # Write-Host $_.Exception.Response.StatusCode
            }
        }
        
        if ($successCount -eq 0) {
            throw "没有文件下载成功，请检查 OneDrive 'ESXi-Custom-ISO' 文件夹内是否有对应文件"
        }
        
        Write-Host "下载完成: $successCount/$($files.Count) 个文件"

    - name: Build Custom ESXi ISO
      shell: pwsh
      id: build_iso
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $OutputEncoding = [System.Text.Encoding]::UTF8
        
        Write-Host ""
        Write-Host "================================================"
        Write-Host "ESXi 8.0U3b + RTL8125BG + NVMe + USB NIC"
        Write-Host "================================================"
        Write-Host ""
        
        Import-Module VMware.ImageBuilder
        Write-Host "ImageBuilder 模块已加载"
        
        Get-EsxSoftwareDepot | ForEach-Object { Remove-EsxSoftwareDepot $_ }
        Write-Host "已清除现有 depot"
        
        $TEMP_DIR = Join-Path $env:TEMP "depots"
        $baseDepotZip = Join-Path $TEMP_DIR "VMware-ESXi-8.0U3b-24280767-depot.zip"
        $nvmeDriverZip = Join-Path $TEMP_DIR "nvme-community-driver_1.0.1.0-3vmw.700.1.0.15843807-component-18902434.zip"
        $reDriverZip = Join-Path $TEMP_DIR "VMware-Re-Driver_1.101.01-5vmw.800.1.0.20613240.zip"
        $usbFlingZips = @(
            (Join-Path $TEMP_DIR "ESXi800-VMKUSB-NIC-FLING-64098182-component-21668107.zip"),
            (Join-Path $TEMP_DIR "ESXi803-VMKUSB-NIC-FLING-76444229-component-24179899.zip"),
            (Join-Path $TEMP_DIR "ESXi80U1-VMKUSB-NIC-FLING-64098092-component-21669994.zip"),
            (Join-Path $TEMP_DIR "ESXi80U2-VMKUSB-NIC-FLING-67561870-component-22416446.zip"),
            (Join-Path $TEMP_DIR "ESXi80U3-VMKUSB-NIC-FLING-75399077-component-24052746.zip")
        )
        $outIso = Join-Path $TEMP_DIR "ESXi-8.0U3b-24280767-RTL8125BG.iso"
        
        Write-Host "加载 depot 文件..."
        Add-EsxSoftwareDepot -Depot $baseDepotZip
        Add-EsxSoftwareDepot -Depot $nvmeDriverZip
        Add-EsxSoftwareDepot -Depot $reDriverZip
        $usbFlingZips | ForEach-Object {
            if (Test-Path $_) { Add-EsxSoftwareDepot -Depot $_ }
        }
        Write-Host "所有 depot 已加载"
        
        $baseProfile = Get-EsxImageProfile | Where-Object { $_.Name -eq "ESXi-8.0U3b-24280767-standard" }
        if (-not $baseProfile) {
            throw "未找到基础镜像配置文件: ESXi-8.0U3b-24280767-standard"
        }
        
        $newProfile = New-EsxImageProfile -CloneProfile $baseProfile -Name "ESXi-8.0U3b-24280767-RTL8125BG" -Vendor "Custom"
        Write-Host "已创建自定义配置文件: $($newProfile.Name)"
        
        $packagesToInject = Get-EsxSoftwarePackage |
            Where-Object { $_.Name -match "re-driver|nvme|vmkusb" } |
            Group-Object -Property Name |
            ForEach-Object { $_.Group | Sort-Object Version -Descending | Select-Object -First 1 }
        
        Write-Host "注入驱动..."
        foreach ($pkg in $packagesToInject) {
            try {
                Add-EsxSoftwarePackage -ImageProfile $newProfile -SoftwarePackage $pkg.Name -ErrorAction Stop
                Write-Host "已注入: $($pkg.Name) $($pkg.Version)"
            } catch {
                Write-Host "已存在: $($pkg.Name)"
            }
        }
        
        Write-Host "导出 ISO..."
        Export-EsxImageProfile -ImageProfile $newProfile -ExportToIso -FilePath $outIso -Force
        
        if (Test-Path $outIso) {
            $sizeMB = (Get-Item $outIso).Length / 1MB
            Write-Host ""
            Write-Host "=== 构建完成 ==="
            Write-Host "ISO 路径: $outIso"
            Write-Host "ISO 大小: $([math]::Round($sizeMB, 2)) MB"
            Write-Host ""
            
            "ISO_PATH=$outIso" >> $env:GITHUB_ENV
        } else {
            throw "ISO 创建失败"
        }

    # 步骤四：幂等上传策略（最终纯净版 - 已更新为 Refresh Token 模式）
    - name: Upload ISO with Idempotent Strategy (Pure)
      shell: pwsh
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $OutputEncoding = [System.Text.Encoding]::UTF8
        
        Write-Host "========================================"
        Write-Host "幂等上传策略：检测→删除→上传（纯净版）"
        Write-Host "========================================"
        Write-Host ""
        
        # 0. 防御性编程：在步骤一开始就确保isoPath变量存在
        Write-Host "[0/7] 初始化ISO路径（防御性编程）..."
        $isoPath = $env:ISO_PATH
        if ([string]::IsNullOrEmpty($isoPath)) {
            $isoPath = Join-Path (Join-Path $env:TEMP "depots") "ESXi-8.0U3b-24280767-RTL8125BG.iso"
            Write-Host "使用默认ISO路径: $isoPath"
        }
        
        # 1. 获取全新的上传token（使用 Refresh Token）
        Write-Host ""
        Write-Host "[1/7] 获取全新的上传token..."
        $tokenUrl = "https://login.microsoftonline.com/$env:OD_TENANT_ID/oauth2/v2.0/token"
        $body = @{
            client_id     = $env:OD_CLIENT_ID
            client_secret = $env:OD_CLIENT_SECRET
            refresh_token = $env:OD_REFRESH_TOKEN
            grant_type    = "refresh_token"
        }
        
        try {
            $uploadTokenResponse = Invoke-RestMethod -Method Post -Uri $tokenUrl -Body $body -ContentType "application/x-www-form-urlencoded"
            $uploadToken = ($uploadTokenResponse.access_token).Trim()
            
            if ([string]::IsNullOrEmpty($uploadToken)) {
                throw "上传用token为空"
            }
            Write-Host "✓ 全新上传token获取成功"
        } catch {
            Write-Error "获取上传token失败: $_"
            throw
        }
        
        # 2. 验证ISO文件
        Write-Host ""
        Write-Host "[2/7] 验证ISO文件..."
        if (-not (Test-Path $isoPath)) { 
            throw "ISO 文件不存在: $isoPath" 
        }
        
        $isoName = "ESXi-8.0U3b-24280767-RTL8125BG.iso"
        $fileInfo = Get-Item $isoPath
        $fileSize = $fileInfo.Length
        Write-Host "✓ ISO文件验证成功:"
        Write-Host "  - 文件名: $isoName"
        Write-Host "  - 文件大小: $([math]::Round($fileSize / 1MB, 2)) MB"
        
        # 3. 准备驱动器和文件夹信息
        Write-Host ""
        Write-Host "[3/7] 准备路径信息..."
        $driveId = "${{ steps.get_drive_info.outputs.driveId }}"
        $folderName = "${{ steps.get_drive_info.outputs.folderName }}"
        
        # 4. 构建文件路径
        Write-Host ""
        Write-Host "[4/7] 构建文件路径..."
        
        $encodedFolderName = [System.Uri]::EscapeDataString($folderName)
        $encodedIsoName = [System.Uri]::EscapeDataString($isoName)
        # 直接使用 /drives/{id}/root:/{folder}/{file} 格式
        $fileUrl = "https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodedFolderName}/${encodedIsoName}"
        
        Write-Host "文件完整URL:"
        Write-Host "  $fileUrl"
        Write-Host ""
        
        # 5. 幂等操作核心：无条件删除现有文件
        Write-Host "[5/7] 执行幂等操作：无条件删除现有文件..."
        
        $uploadHeaders = @{ Authorization = "Bearer $uploadToken" }
        
        Write-Host "检查文件是否存在并尝试删除..."
        try {
            # 尝试删除文件（幂等操作：删除不存在文件也返回成功）
            Invoke-RestMethod -Uri $fileUrl -Headers $uploadHeaders -Method DELETE
            Write-Host "✅ 文件删除成功（或原本不存在）"
            
            # 等待删除操作完成并验证
            Write-Host "等待 2 秒确保删除操作完成..."
            Start-Sleep -Seconds 2
            
        } catch {
            # 即使删除失败也继续尝试上传（可能报404即不存在）
            if ($_.Exception.Response.StatusCode -ne 404) {
                 Write-Host "⚠️ 删除操作异常: $($_.Exception.Message)"
            } else {
                 Write-Host "✅ 文件原本就不存在"
            }
        }
        
        # 6. 创建上传会话
        Write-Host ""
        Write-Host "[6/7] 创建上传会话（纯净请求体）..."
        
        # 构建稳定的上传URL（使用root路径格式）
        $createUrl = "https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodedFolderName}/${encodedIsoName}:/createUploadSession"
        
        Write-Host "使用稳定上传URL:"
        Write-Host "  $createUrl"
        Write-Host ""
        
        $sessionHeaders = @{
            Authorization = "Bearer $uploadToken"
            "Content-Type" = "application/json"
        }
        
        # 纯净请求体
        $bodyJson = @{} | ConvertTo-Json -Compress
        
        try {
            Write-Host "正在发送创建上传会话请求..."
            $session = Invoke-RestMethod -Method POST -Uri $createUrl -Headers $sessionHeaders -Body $bodyJson
            
            if (-not $session.uploadUrl) {
                throw "响应中未找到 uploadUrl"
            }
            
            $uploadSessionUrl = $session.uploadUrl
            Write-Host ""
            Write-Host "✅ 上传会话创建成功！"
            
            # 7. 执行分片上传
            Write-Host ""
            Write-Host "[7/7] 执行分片上传..."
            
            $chunkSize = 3276800 * 10  # 约31.25MB
            $fileStream = [System.IO.File]::OpenRead($isoPath)
            $totalChunks = [math]::Ceiling($fileSize / $chunkSize)
            $bytesUploaded = 0
            
            Write-Host "  - 分片大小: $([math]::Round($chunkSize / 1MB, 2)) MB"
            Write-Host "  - 总块数: $totalChunks"
            Write-Host ""
            
            for ($i = 0; $i -lt $totalChunks; $i++) {
                $buffer = New-Object byte[] $chunkSize
                $bytesRead = $fileStream.Read($buffer, 0, $chunkSize)
                
                if ($bytesRead -eq 0) { break }
                
                $rangeStart = $bytesUploaded
                $rangeEnd = $bytesUploaded + $bytesRead - 1
                $rangeHeader = "bytes $rangeStart-$rangeEnd/$fileSize"
                
                $retry = 0
                $maxRetries = 3
                $success = $false
                
                while (-not $success -and $retry -lt $maxRetries) {
                    try {
                        $request = [System.Net.HttpWebRequest]::Create($uploadSessionUrl)
                        $request.Method = "PUT"
                        $request.ContentType = "application/octet-stream"
                        $request.ContentLength = $bytesRead
                        $request.Headers.Add("Content-Range", $rangeHeader)
                        
                        $requestStream = $request.GetRequestStream()
                        $requestStream.Write($buffer, 0, $bytesRead)
                        $requestStream.Close()
                        
                        try {
                            $response = $request.GetResponse()
                            $responseStream = $response.GetResponseStream()
                            $reader = New-Object System.IO.StreamReader($responseStream)
                            $responseContent = $reader.ReadToEnd()
                            $reader.Close()
                            $responseStream.Close()
                            $response.Close()
                        } catch {
                            # 忽略响应读取错误，只要请求成功发送
                        }
                        
                        $progress = [math]::Round(($rangeEnd + 1) / $fileSize * 100, 2)
                        Write-Host "分片 [$($i+1)/$totalChunks]: ✓ 成功 (进度: ${progress}%)"
                        $success = $true
                        
                    } catch {
                        $retry++
                        if ($retry -eq $maxRetries) {
                            throw "分片上传失败: $($_.Exception.Message)"
                        }
                        Write-Host "分片 [$($i+1)/$totalChunks]: ⚠️ 重试 $retry/$maxRetries (等待 2 秒...)"
                        Start-Sleep -Seconds 2
                    }
                }
                
                $bytesUploaded += $bytesRead
                if (($i + 1) % 5 -eq 0) {
                    Start-Sleep -Milliseconds 300
                }
            }
            
            $fileStream.Close()
            Write-Host ""
            Write-Host "========================================"
            Write-Host "✅ 幂等上传完成！"
            Write-Host "========================================"
            
        } catch {
            Write-Host ""
            Write-Host "❌ 上传失败: $($_.Exception.Message)"
            throw
        }

    - name: Check ISO file exists before artifact upload
      shell: pwsh
      id: check-artifact
      run: |
        Write-Host "=== 检查ISO文件是否存在 ==="
        
        $possiblePaths = @(
            "$env:ISO_PATH",
            "$env:TEMP\depots\ESXi-8.0U3b-24280767-RTL8125BG.iso",
            "$env:RUNNER_TEMP\depots\ESXi-8.0U3b-24280767-RTL8125BG.iso"
        )
        
        $foundPath = $null
        foreach ($path in $possiblePaths) {
            if ($path -and (Test-Path $path)) {
                $foundPath = $path
                $fileSize = (Get-Item $path).Length / 1MB
                Write-Host "✅ 找到ISO文件: $path ($([math]::Round($fileSize, 2)) MB)"
                break
            }
        }
        
        if ($foundPath) {
            "artifact_path=$foundPath" >> $env:GITHUB_OUTPUT
        } else {
            Write-Host "⚠️ ISO文件不存在，将跳过Artifact上传"
        }

    - name: Upload to GitHub Artifacts (Conditional)
      if: steps.check-artifact.outputs.artifact_path != ''
      uses: actions/upload-artifact@v4
      with:
        name: ESXi-8.0U3b-RTL8125BG-ISO
        path: ${{ steps.check-artifact.outputs.artifact_path }}
        retention-days: 7
        if-no-files-found: ignore

    # =========================
    # 计算SHA256用于Release
    # =========================
    - name: Calculate SHA256 for Release
      if: steps.check-artifact.outputs.artifact_path != ''
      shell: pwsh
      id: calculate_sha256
      run: |
        $isoPath = "${{ steps.check-artifact.outputs.artifact_path }}"
        Write-Host "计算ISO文件的SHA256哈希值..."
        
        $hash = (Get-FileHash -Path $isoPath -Algorithm SHA256).Hash
        Write-Host "SHA256: $hash"
        
        "sha256=$hash" >> $env:GITHUB_OUTPUT

    # =========================
    # 删除旧的GitHub Release（如果有）
    # =========================
    - name: Delete Old Release if Exists
      if: steps.check-artifact.outputs.artifact_path != ''
      shell: pwsh
      env:
        GITHUB_TOKEN: ${{ secrets.AUTH_PAT }}
      run: |
        Write-Host "=== 删除旧的GitHub Release（如果存在）==="
        
        # 提取tag名称（取"-RTL8125BG"之前的部分）
        $isoPath = "${{ steps.check-artifact.outputs.artifact_path }}"
        $isoName = Split-Path $isoPath -Leaf
        $tagName = $isoName -replace '\.iso$', '' -replace '-RTL8125BG$', ''
        Write-Host "提取的Tag名称: $tagName"
        
        # 检查是否存在相同tag的Release
        $releasesUrl = "https://api.github.com/repos/${{ github.repository }}/releases"
        
        try {
            Write-Host "获取所有Releases..."
            $releases = Invoke-RestMethod -Uri $releasesUrl -Headers @{
                Authorization = "Bearer $env:GITHUB_TOKEN"
                Accept = "application/vnd.github.v3+json"
            }
            
            $oldRelease = $releases | Where-Object { $_.tag_name -eq $tagName } | Select-Object -First 1
            
            if ($oldRelease) {
                Write-Host "找到旧的Release，删除ID: $($oldRelease.id)..."
                $deleteUrl = "https://api.github.com/repos/${{ github.repository }}/releases/$($oldRelease.id)"
                Invoke-RestMethod -Uri $deleteUrl -Headers @{
                    Authorization = "Bearer $env:GITHUB_TOKEN"
                    Accept = "application/vnd.github.v3+json"
                } -Method DELETE
                Write-Host "✅ 旧Release删除成功"
                
                # 删除关联的tag
                Write-Host "删除关联的tag: $tagName"
                $deleteTagUrl = "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/$tagName"
                try {
                    Invoke-RestMethod -Uri $deleteTagUrl -Headers @{
                        Authorization = "Bearer $env:GITHUB_TOKEN"
                        Accept = "application/vnd.github.v3+json"
                    } -Method DELETE
                    Write-Host "✅ 旧tag删除成功"
                } catch {
                    Write-Host "⚠️ 删除tag时出错（可能不存在）: $_"
                }
            } else {
                Write-Host "没有找到相同tag的旧Release"
            }
        } catch {
            Write-Host "⚠️ 删除旧Release时出错: $_"
            # 不抛出错误，继续执行
        }

    # =========================
    # 创建 GitHub Release
    # =========================
    - name: Create GitHub Release
      if: steps.check-artifact.outputs.artifact_path != ''
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.AUTH_PAT }}
      with:
        tag_name: ESXi-8.0U3b-24280767
        name: ESXi 8.0U3b Custom ISO with RTL8125BG Driver
        body: |
          - **ESXi 版本**: 8.0U3b (24280767)
          - **RTL8125BG 驱动版本**: 1.101.01
          - **SHA256**: ${{ steps.calculate_sha256.outputs.sha256 }}
        files: |
          ${{ steps.check-artifact.outputs.artifact_path }}
        draft: false
        prerelease: false
        generate_release_notes: false

    - name: Display Artifact Download Link
      if: steps.upload-artifact.outputs.artifact-id != ''
      shell: pwsh
      run: |
        Write-Host ""
        Write-Host "========================================"
        Write-Host "✅ GitHub Artifact 上传完成！"
        Write-Host "📦 Artifact 名称: ESXi-8.0U3b-RTL8125BG-ISO"
        Write-Host "🔗 下载链接可在 GitHub Actions 页面查看"
        Write-Host "========================================"
