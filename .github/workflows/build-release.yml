name: Build Realtek R8125 DKMS

on:
  schedule:
    - cron: '0 16 * * 6'  # UTC周六16点 = 北京时间周日0点
  workflow_dispatch:
    inputs:
      force:
        description: '强制构建'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# ============================【手动指定下载地址和版本】============================
env:
  MANUAL_BACKUP_URL: "https://github.com/timeflysoon/temp/releases/download/r8125/r8125-9.016.01.tar.bz2"
  MANUAL_BACKUP_VERSION: "9.016.01"
#=================================================================================

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: true
        
    - name: Setup variables
      id: vars
      run: |
        VERSION="${{ env.MANUAL_BACKUP_VERSION }}"
        
        # 检查是否已存在此版本
        if git tag | grep -q "v$VERSION"; then
          echo "skip=true" >> $GITHUB_OUTPUT
          echo "Version v$VERSION already exists"
        else
          echo "skip=false" >> $GITHUB_OUTPUT
          echo "New version v$VERSION detected"
        fi
        
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "download_url=${{ env.MANUAL_BACKUP_URL }}" >> $GITHUB_OUTPUT
        
    - name: Download and extract driver
      id: download-step
      if: steps.vars.outputs.skip == 'false' || github.event.inputs.force == 'true'
      run: |
        VERSION="${{ steps.vars.outputs.version }}"
        DOWNLOAD_URL="${{ steps.vars.outputs.download_url }}"
        
        echo "Downloading driver from: $DOWNLOAD_URL"
        echo "Version: $VERSION"
        
        # 创建工作目录
        WORKDIR="$GITHUB_WORKSPACE/driver-$VERSION"
        rm -rf "$WORKDIR"
        mkdir -p "$WORKDIR"
        
        # 下载驱动
        cd "$WORKDIR"
        wget -O driver.tar.bz2 "$DOWNLOAD_URL" || {
          echo "下载失败，使用备用方案"
          exit 1
        }
        
        # 解压驱动
        tar -xjf driver.tar.bz2
        
        # 查找驱动目录
        DRIVER_DIR=$(find . -maxdepth 1 -name "r8125*" -type d | head -1)
        if [ -z "$DRIVER_DIR" ]; then
          DRIVER_DIR="."
        fi
        
        echo "driver_dir=$DRIVER_DIR" >> $GITHUB_OUTPUT
        echo "driver_files=$(find $DRIVER_DIR -type f -name "*.c" -o -name "*.h" -o -name "Makefile" | wc -l)" >> $GITHUB_OUTPUT
        
    - name: Build package
      id: build-step
      if: steps.vars.outputs.skip == 'false' || github.event.inputs.force == 'true'
      env:
        CUR_VERSION: ${{ steps.vars.outputs.version }}
      run: |
        # 基础变量设置
        DEB_NAME="realtek-r8125-dkms"
        RELEASE="1"
        ARCH="amd64"
        FULL_VERSION="${CUR_VERSION}-${RELEASE}"
        DEB_FILE="${DEB_NAME}_${FULL_VERSION}_${ARCH}.deb"
        
        echo "Building: $DEB_FILE"
        
        # 获取驱动目录
        WORKDIR="$GITHUB_WORKSPACE/build"
        DRIVER_SRC="$GITHUB_WORKSPACE/driver-${CUR_VERSION}/${{ steps.download-step.outputs.driver_dir }}"
        PKGDIR="$WORKDIR/$DEB_NAME-$FULL_VERSION"
        
        # 清理和创建目录
        rm -rf "$WORKDIR"
        mkdir -p "$WORKDIR"
        rm -rf "$PKGDIR"
        mkdir -p "$PKGDIR/DEBIAN"
        mkdir -p "$PKGDIR/usr/src/r8125-$CUR_VERSION"
        mkdir -p "$PKGDIR/etc/modprobe.d"
        
        # 1. 创建control文件 - 使用echo逐行写入
        echo "Package: $DEB_NAME" > "$PKGDIR/DEBIAN/control"
        echo "Version: $FULL_VERSION" >> "$PKGDIR/DEBIAN/control"
        echo "Section: kernel" >> "$PKGDIR/DEBIAN/control"
        echo "Priority: optional" >> "$PKGDIR/DEBIAN/control"
        echo "Architecture: $ARCH" >> "$PKGDIR/DEBIAN/control"
        echo "Maintainer: GitHub Actions <actions@github.com>" >> "$PKGDIR/DEBIAN/control"
        echo "Depends: dkms, build-essential" >> "$PKGDIR/DEBIAN/control"
        echo "Recommends: pve-headers" >> "$PKGDIR/DEBIAN/control"
        echo "Provides: r8125-dkms" >> "$PKGDIR/DEBIAN/control"
        echo "Conflicts: r8125-dkms" >> "$PKGDIR/DEBIAN/control"
        echo "Description: Realtek RTL8125 2.5G Ethernet DKMS driver" >> "$PKGDIR/DEBIAN/control"
        echo " DKMS driver for Realtek RTL8125 2.5G Ethernet cards." >> "$PKGDIR/DEBIAN/control"
        echo " Supports kernel up to 6.12." >> "$PKGDIR/DEBIAN/control"
        echo " Compatible with Proxmox VE 8.x / 9.x." >> "$PKGDIR/DEBIAN/control"
        echo " Built from Realtek official driver v$CUR_VERSION." >> "$PKGDIR/DEBIAN/control"
        echo " Source: ${{ env.MANUAL_BACKUP_URL }}" >> "$PKGDIR/DEBIAN/control"
        
        # 2. 创建dkms.conf - 使用echo逐行写入
        echo 'PACKAGE_NAME="r8125"' > "$PKGDIR/usr/src/r8125-$CUR_VERSION/dkms.conf"
        echo "PACKAGE_VERSION=\"$CUR_VERSION\"" >> "$PKGDIR/usr/src/r8125-$CUR_VERSION/dkms.conf"
        echo 'BUILT_MODULE_NAME[0]="r8125"' >> "$PKGDIR/usr/src/r8125-$CUR_VERSION/dkms.conf"
        echo 'DEST_MODULE_LOCATION[0]="/updates/dkms"' >> "$PKGDIR/usr/src/r8125-$CUR_VERSION/dkms.conf"
        echo 'AUTOINSTALL="yes"' >> "$PKGDIR/usr/src/r8125-$CUR_VERSION/dkms.conf"
        echo 'MAKE[0]="make -C src KVER=${kernelver} -j$(nproc)"' >> "$PKGDIR/usr/src/r8125-$CUR_VERSION/dkms.conf"
        echo 'CLEAN="make -C src clean"' >> "$PKGDIR/usr/src/r8125-$CUR_VERSION/dkms.conf"
        
        # 3. 复制驱动源码
        echo "复制驱动源码从: $DRIVER_SRC"
        mkdir -p "$PKGDIR/usr/src/r8125-$CUR_VERSION/src"
        
        if [ -d "$DRIVER_SRC/src" ]; then
          echo "检测到标准Realtek源码结构"
          cp -r "$DRIVER_SRC/src/"* "$PKGDIR/usr/src/r8125-$CUR_VERSION/src/"
        else
          echo "检测到非标准源码结构，尝试直接复制"
          cp -r "$DRIVER_SRC/"* "$PKGDIR/usr/src/r8125-$CUR_VERSION/src/" 2>/dev/null || true
        fi
        
        # 关键文件校验
        if [ ! -f "$PKGDIR/usr/src/r8125-$CUR_VERSION/src/Makefile" ]; then
          echo "错误: 复制后未找到Makefile文件"
          exit 1
        fi
        
        # 4. 创建黑名单配置 (增强版)
        echo "# 完全禁用原生 r8169 驱动，使用 r8125 驱动" > "$PKGDIR/etc/modprobe.d/r8125-blacklist.conf"
        echo "blacklist r8169" >> "$PKGDIR/etc/modprobe.d/r8125-blacklist.conf"
        echo "install r8169 /bin/true" >> "$PKGDIR/etc/modprobe.d/r8125-blacklist.conf"
        
        # 5. 【关键修改】生成postinst脚本 - 增强离线安装容错性
        echo '#!/bin/bash' > "$PKGDIR/DEBIAN/postinst"
        echo 'set -e' >> "$PKGDIR/DEBIAN/postinst"
        echo '# 硬编码变量，确保在安装环境中正确识别' >> "$PKGDIR/DEBIAN/postinst"
        echo 'MODULE="r8125"' >> "$PKGDIR/DEBIAN/postinst"
        echo "VERSION=\"$CUR_VERSION\"" >> "$PKGDIR/DEBIAN/postinst"
        echo 'KVER="$(uname -r)"' >> "$PKGDIR/DEBIAN/postinst"
        echo '' >> "$PKGDIR/DEBIAN/postinst"
        echo 'case "$1" in' >> "$PKGDIR/DEBIAN/postinst"
        echo '    configure|install)' >> "$PKGDIR/DEBIAN/postinst"
        echo '        echo "配置 DKMS 模块: $MODULE/$VERSION"' >> "$PKGDIR/DEBIAN/postinst"
        echo '' >> "$PKGDIR/DEBIAN/postinst"
        echo '        # 检查是否在PVE环境中' >> "$PKGDIR/DEBIAN/postinst"
        echo '        if [ -f /etc/os-release ] && grep -qi "proxmox" /etc/os-release; then' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "检测到 Proxmox VE 环境"' >> "$PKGDIR/DEBIAN/postinst"
        echo '        fi' >> "$PKGDIR/DEBIAN/postinst"
        echo '' >> "$PKGDIR/DEBIAN/postinst"
        echo '        # 检查dkms是否可用，不可用时给出明确提示，但不退出' >> "$PKGDIR/DEBIAN/postinst"
        echo '        if ! command -v dkms >/dev/null 2>&1; then' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "=================================================================="' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "⚠️  警告: dkms 命令未找到。驱动暂时无法编译。"' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "   这通常发生在无网络的离线安装环境中。"' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "   请确保已安装 dkms 和 pve-headers-$(uname -r) 包。"' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "   安装命令（联网后）: apt update && apt install dkms pve-headers"' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "=================================================================="' >> "$PKGDIR/DEBIAN/postinst"
        echo '        else' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "✅ dkms 工具已就绪。"' >> "$PKGDIR/DEBIAN/postinst"
        echo '        fi' >> "$PKGDIR/DEBIAN/postinst"
        echo '' >> "$PKGDIR/DEBIAN/postinst"
        echo '        # 检查内核头文件 - 增强容错，只警告不退出' >> "$PKGDIR/DEBIAN/postinst"
        echo '        KERNEL_HEADERS_DIR="/lib/modules/$KVER/build"' >> "$PKGDIR/DEBIAN/postinst"
        echo '        if [ ! -d "$KERNEL_HEADERS_DIR" ] || [ ! -f "$KERNEL_HEADERS_DIR/Makefile" ]; then' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "=================================================================="' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "⚠️  警告: 内核头文件未找到或不全 ($KERNEL_HEADERS_DIR)"' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "   这可能导致DKMS编译失败，驱动无法立即加载。"' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "   对于 Proxmox VE，请执行："' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "     apt update && apt install pve-headers"' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "   安装头文件并重启后，驱动将自动编译并加载。"' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "=================================================================="' >> "$PKGDIR/DEBIAN/postinst"
        echo '        else' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "✅ 内核头文件已找到: $KERNEL_HEADERS_DIR"' >> "$PKGDIR/DEBIAN/postinst"
        echo '        fi' >> "$PKGDIR/DEBIAN/postinst"
        echo '' >> "$PKGDIR/DEBIAN/postinst"
        echo '        # 无论环境如何，先确保黑名单和启动列表生效（最关键的一步）' >> "$PKGDIR/DEBIAN/postinst"
        echo '        echo "应用黑名单并配置启动模块..."' >> "$PKGDIR/DEBIAN/postinst"
        echo '        if ! grep -q "^r8125" /etc/modules 2>/dev/null; then' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "r8125" >> /etc/modules' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "✅ 已将 r8125 添加到 /etc/modules（启动时加载）"' >> "$PKGDIR/DEBIAN/postinst"
        echo '        fi' >> "$PKGDIR/DEBIAN/postinst"
        echo '' >> "$PKGDIR/DEBIAN/postinst"
        echo '        # 尝试进行DKMS操作，但任何一步失败都不阻止脚本继续' >> "$PKGDIR/DEBIAN/postinst"
        echo '        if command -v dkms >/dev/null 2>&1 && [ -d "/lib/modules/$KVER/build" ]; then' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "检测到完整编译环境，尝试注册和构建DKMS模块..."' >> "$PKGDIR/DEBIAN/postinst"
        echo '            if ! dkms status | grep -q "^$MODULE/$VERSION"; then' >> "$PKGDIR/DEBIAN/postinst"
        echo '                dkms add -m "$MODULE" -v "$VERSION" 2>/dev/null || echo "⚠️  DKMS add步骤遇到问题，模块可能已存在。"' >> "$PKGDIR/DEBIAN/postinst"
        echo '            fi' >> "$PKGDIR/DEBIAN/postinst"
        echo '            dkms build -m "$MODULE" -v "$VERSION" 2>&1 || echo "⚠️  驱动构建失败，请检查内核头文件是否安装正确。"' >> "$PKGDIR/DEBIAN/postinst"
        echo '            dkms install -m "$MODULE" -v "$VERSION" 2>&1 || echo "⚠️  驱动安装失败。"' >> "$PKGDIR/DEBIAN/postinst"
        echo '        else' >> "$PKGDIR/DEBIAN/postinst"
        echo '            echo "跳过DKMS构建（环境不满足）。"' >> "$PKGDIR/DEBIAN/postinst"
        echo '        fi' >> "$PKGDIR/DEBIAN/postinst"
        echo '' >> "$PKGDIR/DEBIAN/postinst"
        echo '        # 无论如何都尝试更新initramfs并运行depmod' >> "$PKGDIR/DEBIAN/postinst"
        echo '        echo "更新 initramfs 和模块依赖..."' >> "$PKGDIR/DEBIAN/postinst"
        echo '        if command -v update-initramfs >/dev/null 2>&1; then' >> "$PKGDIR/DEBIAN/postinst"
        echo '            update-initramfs -u -k all 2>/dev/null || echo "⚠️  initramfs更新失败，但继续..."' >> "$PKGDIR/DEBIAN/postinst"
        echo '        fi' >> "$PKGDIR/DEBIAN/postinst"
        echo '        depmod -a 2>/dev/null || true' >> "$PKGDIR/DEBIAN/postinst"
        echo '' >> "$PKGDIR/DEBIAN/postinst"
        echo '        echo "✅ DKMS 模块配置流程完成。"' >> "$PKGDIR/DEBIAN/postinst"
        echo '        echo "   黑名单已生效：原生 r8169 驱动将被禁用。"' >> "$PKGDIR/DEBIAN/postinst"
        echo '        echo "   r8125 模块已加入启动列表。"' >> "$PKGDIR/DEBIAN/postinst"
        echo '        echo "   如果当前因缺少头文件未能编译，请在安装 pve-headers 后重启系统。"' >> "$PKGDIR/DEBIAN/postinst"
        echo '        ;;' >> "$PKGDIR/DEBIAN/postinst"
        echo 'esac' >> "$PKGDIR/DEBIAN/postinst"
        echo 'exit 0' >> "$PKGDIR/DEBIAN/postinst"
        
        # 6. 生成prerm脚本 - 使用echo逐行写入
        echo '#!/bin/sh' > "$PKGDIR/DEBIAN/prerm"
        echo 'set -e' >> "$PKGDIR/DEBIAN/prerm"
        echo "MODULE=\"r8125\"" >> "$PKGDIR/DEBIAN/prerm"
        echo "VERSION=\"$CUR_VERSION\"" >> "$PKGDIR/DEBIAN/prerm"
        echo 'case "$1" in' >> "$PKGDIR/DEBIAN/prerm"
        echo '    remove|deconfigure)' >> "$PKGDIR/DEBIAN/prerm"
        echo '        if lsmod | grep -q "^$MODULE"; then' >> "$PKGDIR/DEBIAN/prerm"
        echo '            modprobe -r "$MODULE" || true' >> "$PKGDIR/DEBIAN/prerm"
        echo '        fi' >> "$PKGDIR/DEBIAN/prerm"
        echo '' >> "$PKGDIR/DEBIAN/prerm"
        echo '        if dkms status | grep -q "^$MODULE/$VERSION"; then' >> "$PKGDIR/DEBIAN/prerm"
        echo '            dkms remove -m "$MODULE" -v "$VERSION" --all || true' >> "$PKGDIR/DEBIAN/prerm"
        echo '        fi' >> "$PKGDIR/DEBIAN/prerm"
        echo '        ;;' >> "$PKGDIR/DEBIAN/prerm"
        echo 'esac' >> "$PKGDIR/DEBIAN/prerm"
        echo 'exit 0' >> "$PKGDIR/DEBIAN/prerm"
        
        # 7. 设置权限
        chmod 0755 "$PKGDIR/DEBIAN"
        chmod 0755 "$PKGDIR/DEBIAN/postinst"
        chmod 0755 "$PKGDIR/DEBIAN/prerm"
        chmod 0644 "$PKGDIR/DEBIAN/control"
        chmod 0644 "$PKGDIR/etc/modprobe.d/r8125-blacklist.conf"
        
        find "$PKGDIR/usr/src/r8125-$CUR_VERSION" -type d -exec chmod 0755 {} \;
        find "$PKGDIR/usr/src/r8125-$CUR_VERSION" -type f -exec chmod 0644 {} \;
        
        # 8. 构建.deb包
        cd "$WORKDIR"
        dpkg-deb --build "$DEB_NAME-$FULL_VERSION"
        
        # 验证生成的deb包
        if [ ! -f "$DEB_NAME-$FULL_VERSION.deb" ]; then
            echo "错误: 构建失败，未生成.deb文件"
            exit 1
        fi
        
        mv "$DEB_NAME-$FULL_VERSION.deb" "$GITHUB_WORKSPACE/$DEB_FILE"
        
        # 输出文件路径
        echo "deb_file=$DEB_FILE" >> $GITHUB_OUTPUT
        
    - name: List generated files
      if: steps.vars.outputs.skip == 'false' || github.event.inputs.force == 'true'
      run: |
        echo "工作区文件列表:"
        ls -la "$GITHUB_WORKSPACE"/*.deb 2>/dev/null || echo "没有找到.deb文件"
        
    - name: Create Release
      if: steps.vars.outputs.skip == 'false' || github.event.inputs.force == 'true'
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: |
          ${{ steps.build-step.outputs.deb_file }}
        tag_name: v${{ steps.vars.outputs.version }}
        name: Realtek R8125 DKMS v${{ steps.vars.outputs.version }}
        body: |
          Realtek RTL8125 2.5G Ethernet DKMS driver package
          
          ## 🔧 功能特性
          - ✅ DKMS 动态内核模块支持
          - ✅ 自动禁用原生 r8169 驱动（防止冲突）
          - ✅ 多核编译优化 (-j$(nproc))
          - ✅ 自动更新 initramfs
          - ✅ 兼容 PVE 8.x / 9.x (Kernel 6.2 - 6.12)
          - ✅ 推荐安装 pve-headers 以自动编译驱动
          
          ## 📦 安装说明
          ```
          sudo dpkg -i realtek-r8125-dkms_${{ steps.vars.outputs.version }}-1_amd64.deb
          ```
          
          ## ⚠️ 重要提示
          1. **离线安装说明**：如果在离线环境中安装，可能会因缺少 `pve-headers` 而无法立即编译驱动，但黑名单和启动项已配置。**重启后网卡灯可能仍不亮，这是正常现象。** 请在有网络后执行：
          ```
          apt update && apt install pve-headers
          ```
          然后再次重启，驱动将自动编译并加载。
          
          2. **驱动竞争已解决**：安装后原生 `r8169` 驱动已被完全禁用，可确保 `r8125` 驱动独占硬件。
          
          ## 🔍 验证命令
          ```
          # 检查DKMS状态
          dkms status
          
          # 检查模块信息
          modinfo r8125
          
          # 检查模块是否已加载
          lsmod | grep r8125
          
          # 确认原生驱动已禁用
          lsmod | grep r8169
          ```
          
          ## 📝 版本信息
          - 驱动版本: ${{ steps.vars.outputs.version }}
          - 发布日期: $(date -u +"%Y-%m-%d")
          - 适用于: Realtek RTL8125 2.5G 网卡
          
          ## 🔗 相关链接
          - [Realtek 官方驱动](https://www.realtek.com/en/component/zoo/category/network-interface-controllers-10-100-1000m-gigabit-ethernet-pci-express-software)
        draft: false
        prerelease: false
