name: Build and Release PVE ISO with RTL8125
on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '强制重新构建（即使版本相同）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      proxmox_iso_url:
        description: 'Proxmox ISO URL'
        required: true
        default: 'https://enterprise.proxmox.com/iso/proxmox-ve_9.1-1.iso'
      r8125_driver_url:
        description: 'RTL8125 Driver URL'
        required: true
        default: 'https://github.com/timeflysoon/realtek-r8125-dkms/releases/download/v9.016.01/realtek-r8125-dkms_9.016.01-1_amd64.deb'
permissions:
  contents: write
# ============================【只需要修改这里】============================
# 注意：无需编辑此 YAML 文件。
# 要修改配置，请在触发 workflow 时通过 inputs 输入自定义 URL 值。
# 默认值已设置，如果不修改将使用默认。
# =======================================================================
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 防止长时间挂起
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: |
          sudo apt-get update
          # 添加 isolinux 包以获取 isohdpfx.bin（为旧版 PVE 准备）
          sudo apt-get install -y xorriso curl file jq isolinux
      # =========================
      # 解析 ISO URL 以获取文件名（用于缓存和下载）
      # =========================
      - name: Parse ISO URL for filename
        run: |
          ISO_ORIG=$(basename "${{ inputs.proxmox_iso_url }}")
          echo "ISO_ORIG=$ISO_ORIG" >> $GITHUB_ENV
      # =========================
      # 缓存 Proxmox ISO
      # =========================
      - name: Cache Proxmox ISO
        id: cache-iso
        uses: actions/cache@v4
        with:
          path: ${{ env.ISO_ORIG }}
          key: pve-iso-${{ env.ISO_ORIG }}-${{ github.run_id }}
          restore-keys: |
            pve-iso-${{ env.ISO_ORIG }}
      # =========================
      # 下载 Proxmox ISO（如果未缓存）
      # =========================
      - name: Download Proxmox ISO
        if: steps.cache-iso.outputs.cache-hit != 'true'
        run: |
          curl -fL --retry 3 -o "$ISO_ORIG" "${{ inputs.proxmox_iso_url }}"
          echo ">>> ISO 文件信息："
          ls -lh "$ISO_ORIG"
          file "$ISO_ORIG"
      # =========================
      # 验证 ISO 完整性
      # =========================
      - name: Verify ISO integrity
        if: steps.cache-iso.outputs.cache-hit != 'true'
        run: |
          echo "验证 ISO 完整性..."
          ISO_SIZE=$(stat -c%s "$ISO_ORIG")
          if [ "$ISO_SIZE" -lt 1000000000 ]; then # 小于1GB
            echo "❌ ISO 文件过小，可能下载失败"
            exit 1
          fi
          
          # 检查 ISO 是否包含必要的目录
          if ! xorriso -indev "$ISO_ORIG" -toc 2>&1 | grep -q "Media summary"; then
            echo "❌ ISO 文件损坏或格式不正确"
            exit 1
          fi
          echo "✅ ISO 验证通过"
      # =========================
      # 解析配置（自动生成所有变量）
      # =========================
      - name: Parse configuration and setup variables
        run: |
          echo "ISO_ORIG=$ISO_ORIG"
          
          # 1. 解析 PVE 版本 (用于文件名)
          if [[ "$ISO_ORIG" =~ proxmox-ve_([0-9]+\.[0-9]+(-[0-9]+)?)\.iso$ ]]; then
            PVE_VERSION="${BASH_REMATCH[1]}"
            echo "PVE_VERSION=$PVE_VERSION" >> $GITHUB_ENV
            echo "ISO_OUTPUT=PVE-${PVE_VERSION}-r8125.iso" >> $GITHUB_ENV
          else
            echo "❌ 无法从 ISO 文件名提取版本号: $ISO_ORIG"
            echo "预期格式: proxmox-ve_X.Y-Z.iso"
            exit 1
          fi

          # 2. 【完美修正】使用 blkid 提取原版 ISO 卷标
          # blkid 能直接输出干净的 Label，无需正则清洗
          echo ">>> 提取原版 ISO 卷标..."
          ORIG_LABEL=$(blkid -o value -s LABEL "$ISO_ORIG")
          
          if [ -z "$ORIG_LABEL" ]; then
             echo "⚠️ 无法提取卷标，使用文件名推断"
             # 兜底：PVE 官方格式通常是 PVE_x.x
             ORIG_LABEL="PVE_${PVE_VERSION%.*}"
          fi
          
          echo "✅ 沿用原版卷标: $ORIG_LABEL"
          echo "ISO_LABEL=$ORIG_LABEL" >> $GITHUB_ENV
          
          # 3. 解析 RTL8125 驱动 URL
          DRIVER_URL="${{ inputs.r8125_driver_url }}"
          
          # 提取仓库、标签、文件名等信息
          # 格式: https://github.com/{owner}/{repo}/releases/download/{tag}/{filename}
          if [[ "$DRIVER_URL" =~ https://github.com/([^/]+)/([^/]+)/releases/download/([^/]+)/(.+) ]]; then
            OWNER="${BASH_REMATCH[1]}"
            REPO="${BASH_REMATCH[2]}"
            TAG="${BASH_REMATCH[3]}"
            FILENAME="${BASH_REMATCH[4]}"
            
            echo "DRIVER_OWNER=$OWNER" >> $GITHUB_ENV
            echo "DRIVER_REPO=$REPO" >> $GITHUB_ENV
            echo "DRIVER_TAG=$TAG" >> $GITHUB_ENV
            echo "DRIVER_FILENAME=$FILENAME" >> $GITHUB_ENV
            
            # 提取显示版本（从文件名中提取版本号）
            if [[ "$FILENAME" =~ realtek-r8125-dkms_([^_]+)_amd64\.deb ]]; then
              echo "DRIVER_DISPLAY_VERSION=${BASH_REMATCH[1]}" >> $GITHUB_ENV
            else
              # 如果文件名格式不匹配，使用标签作为版本
              echo "DRIVER_DISPLAY_VERSION=$TAG" >> $GITHUB_ENV
            fi
            
            echo ">>> 驱动解析结果："
            echo "所有者: $OWNER"
            echo "仓库: $REPO"
            echo "标签: $TAG"
            echo "文件名: $FILENAME"
            echo "显示版本: $DRIVER_DISPLAY_VERSION"
          else
            echo "❌ 无法解析驱动URL: $DRIVER_URL"
            echo "URL 格式应为: https://github.com/owner/repo/releases/download/tag/filename"
            exit 1
          fi
      # =========================
      # 检查是否需要重建（修正：强制重建时删除已存在的 Release）
      # =========================
      - name: Check if rebuild is needed
        id: check-rebuild
        run: |
          SKIP=false
          if [ "${{ inputs.force_rebuild }}" = "true" ]; then
            echo ">>> 强制重新构建模式"
            
            # 删除已存在的 Release（幂等操作）
            echo "检查并删除已存在的 Release..."
            RELEASE_INFO=$(curl -s \
              -H "Authorization: token ${{ github.token }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/pve-${PVE_VERSION}-r8125")
            
            if [ "$(echo "$RELEASE_INFO" | jq -r '.message // "exists"')" != "Not Found" ]; then
              RELEASE_ID=$(echo "$RELEASE_INFO" | jq -r '.id')
              echo "删除 Release ID: $RELEASE_ID"
              curl -s -X DELETE \
                -H "Authorization: token ${{ github.token }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/$RELEASE_ID"
              echo "✅ 已删除现有的 Release"
            else
              echo "✅ 没有现有的 Release 需要删除"
            fi
            
            SKIP=false
          else
            echo ">>> 检查现有 Release"
            RELEASE_INFO=$(curl -s \
              -H "Authorization: token ${{ github.token }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/pve-${PVE_VERSION}-r8125")
            
            if [ "$(echo "$RELEASE_INFO" | jq -r '.message // "exists"')" != "Not Found" ]; then
              echo "✅ 已存在版本 ${PVE_VERSION}-r8125 的 Release，跳过构建"
              SKIP=true
            else
              echo ">>> 未找到现有 Release，继续构建"
            fi
          fi
          echo "skip_build=$SKIP" >> $GITHUB_OUTPUT
      # =========================
      # 下载私有仓库 RTL8125 DKMS
      # =========================
      - name: Download RTL8125 Driver from Private Repo
        if: ${{ steps.check-rebuild.outputs.skip_build != 'true' }}
        env:
          PAT: ${{ secrets.AUTH_PAT }}
        run: |
          set -e
          mkdir -p drivers
          
          echo ">>> 驱动下载配置"
          echo "完整URL: ${{ inputs.r8125_driver_url }}"
          echo "仓库: $DRIVER_OWNER/$DRIVER_REPO"
          echo "标签: $DRIVER_TAG"
          echo "文件名: $DRIVER_FILENAME"
          
          echo ">>> 通过 GitHub API 获取资源下载URL"
          
          # 使用 GitHub API 获取资源的真实下载URL
          ASSET_URL=$(curl -s \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$DRIVER_OWNER/$DRIVER_REPO/releases/tags/$DRIVER_TAG" \
            | jq -r ".assets[] | select(.name == \"$DRIVER_FILENAME\") | .url")
          
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "❌ 无法获取资源URL，请检查："
            echo " 1. 仓库是否存在: $DRIVER_OWNER/$DRIVER_REPO"
            echo " 2. 标签是否正确: $DRIVER_TAG"
            echo " 3. 文件名是否正确: $DRIVER_FILENAME"
            echo " 4. PAT 是否有访问权限"
            exit 1
          fi
          
          echo "✅ 资源API URL 获取成功"
          DRIVER_FILE="drivers/$DRIVER_FILENAME"
          echo "DRIVER_FILE=$DRIVER_FILE" >> $GITHUB_ENV
          
          echo ">>> 下载驱动文件"
          
          # 使用 API URL 下载，需要添加 Accept header
          curl -fL \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/octet-stream" \
            --retry 3 \
            -o "$DRIVER_FILE" \
            "$ASSET_URL"
          
          echo "✅ 驱动下载完成"
          echo ">>> 驱动文件信息:"
          ls -lh "$DRIVER_FILE"
          file "$DRIVER_FILE"
          
          SIZE=$(stat -c%s "$DRIVER_FILE")
          echo "驱动大小: $SIZE bytes"
          
          if [ "$SIZE" -lt 50000 ]; then
            echo "❌ 驱动文件过小，可能下载失败"
            exit 1
          fi
      # =========================
      # 构建 ISO (智能适配 PVE 8.2+ 纯GRUB架构)
      # =========================
      - name: Build Custom ISO
        if: steps.check-rebuild.outputs.skip_build != 'true'
        run: |
          rm -rf work && mkdir -p work/iso
          
          echo ">>> 1. 解包 ISO"
          xorriso -osirrox on -indev "$ISO_ORIG" -extract / work/iso
          chmod -R +w work/iso

          echo ">>> 2. 注入驱动包（多位置冗余）"
          mkdir -p work/iso/pool/extras
          mkdir -p work/iso/pool/non-free
          mkdir -p work/iso/drivers
          cp "$DRIVER_FILE" work/iso/pool/extras/
          cp "$DRIVER_FILE" work/iso/pool/non-free/
          cp "$DRIVER_FILE" work/iso/drivers/
          cp "$DRIVER_FILE" work/iso/  # 根目录也放一份，增加被搜索到的概率

          echo ">>> 3. 【核心修改】配置 Preseed (通用全盘搜索与安装)"
          PRESEED_FILE="work/iso/preseed.cfg"
          cat > "$PRESEED_FILE" << 'EOF'
# PVE 自动安装配置 - 通用驱动集成版
d-i partman/early_command string debconf-set partman-auto/disk "$(list-devices disk | head -1)"

d-i preseed/late_command string \
    # 第一阶段：在全系统范围内暴力搜索驱动包
    mkdir -p /mnt/search_source; \
    DRIVER_SOURCE_PATH=""; \
    echo "===== 开始搜索 RTL8125 驱动包 =====" > /dev/console; \
    \
    # 1. 首先尝试标准 ISO 挂载点（非Ventoy环境）
    for MOUNT_POINT in /cdrom /media/cdrom /mnt/cdrom /dev/sr0; do \
        if mount $MOUNT_POINT /mnt/search_source 2>/dev/null; then \
            echo "正在搜索标准挂载点: $MOUNT_POINT" > /dev/console; \
            DEB_FILE=$(find /mnt/search_source -type f -name "realtek-r8125-dkms*.deb" 2>/dev/null | head -1); \
            if [ -n "$DEB_FILE" ]; then \
                DRIVER_SOURCE_PATH="$DEB_FILE"; \
                echo "✅ 在标准挂载点找到驱动包: $DRIVER_SOURCE_PATH" > /dev/console; \
                umount /mnt/search_source; \
                break; \
            fi; \
            umount /mnt/search_source; \
        fi; \
    done; \
    \
    # 2. 如果标准点没找到，开始扫描所有磁盘分区（针对Ventoy等环境）
    if [ -z "$DRIVER_SOURCE_PATH" ]; then \
        echo "标准挂载点未找到，开始扫描磁盘分区..." > /dev/console; \
        # 使用更宽泛的匹配模式，覆盖 sd[a-z]1 到 sd[a-z]9, sd[a-z]10+， nvme0n1p1 到 nvmeXnYpZ 等
        for DISK_PARTITION in /dev/sd[a-z][1-9]* /dev/nvme[0-9]n[0-9]p[1-9]* /dev/mmcblk[0-9]p[1-9]*; do \
            if [ -e "$DISK_PARTITION" ]; then \
                if mount "$DISK_PARTITION" /mnt/search_source 2>/dev/null; then \
                    echo "正在扫描分区: $DISK_PARTITION" > /dev/console; \
                    DEB_FILE=$(find /mnt/search_source -type f -name "realtek-r8125-dkms*.deb" 2>/dev/null | head -1); \
                    if [ -n "$DEB_FILE" ]; then \
                        DRIVER_SOURCE_PATH="$DEB_FILE"; \
                        echo "✅ 在分区 $DISK_PARTITION 上找到驱动包: $DRIVER_SOURCE_PATH" > /dev/console; \
                        umount /mnt/search_source; \
                        break; \
                    fi; \
                    umount /mnt/search_source; \
                fi; \
            fi; \
        done; \
    fi; \
    \
    # 3. 将找到的驱动包复制到新系统的 /tmp 目录
    if [ -n "$DRIVER_SOURCE_PATH" ]; then \
        cp "$DRIVER_SOURCE_PATH" /target/tmp/r8125.driver.deb; \
        echo "驱动包已复制到新系统: /tmp/r8125.driver.deb" > /dev/console; \
    else \
        echo "⚠️  警告：在所有位置均未找到驱动包。请手动安装。" > /dev/console; \
    fi; \
    \
    # 第二阶段：进入新安装的系统进行配置和安装
    in-target sh -c '\'' \
        echo "===== 开始驱动安装与系统配置 =====" > /dev/console; \
        INSTALL_LOG="/root/r8125_post_install.log"; \
        echo "驱动安装日志: $INSTALL_LOG" > /dev/console; \
        \
        # A. 【绝对优先】创建黑名单配置，完全阻止 r8169
        echo "1. 创建黑名单配置..." > /dev/console; \
        echo "blacklist r8169" > /etc/modprobe.d/r8125-blacklist.conf; \
        echo "install r8169 /bin/true" >> /etc/modprobe.d/r8125-blacklist.conf; \
        echo "✅ 原生 r8169 驱动已被加入黑名单。" > /dev/console; \
        \
        # B. 将 r8125 加入启动模块列表
        echo "2. 配置启动加载模块..." > /dev/console; \
        echo "r8125" >> /etc/modules; \
        echo "✅ r8125 模块已加入 /etc/modules。" > /dev/console; \
        \
        # C. 如果找到了驱动包，尝试安装
        if [ -f /tmp/r8125.driver.deb ]; then \
            echo "3. 开始安装驱动包..." > /dev/console; \
            # 强制安装，允许缺少依赖（如dkms），这是离线安装的关键
            dpkg --force-depends -i /tmp/r8125.driver.deb 2>&1 | tee $INSTALL_LOG; \
            echo "驱动包安装完成，日志已保存。" > /dev/console; \
            \
            # D. 检查并尝试编译驱动（如果环境允许）
            if command -v dkms >/dev/null 2>&1 && [ -d "/lib/modules/$(uname -r)/build" ]; then \
                echo "4. 检测到编译环境，尝试构建驱动模块..." > /dev/console; \
                dkms install r8125 2>&1 | tee -a $INSTALL_LOG; \
            else \
                echo "4. 注意：当前缺少编译环境（dkms或内核头文件）。" > /dev/console; \
                echo "   驱动将在安装 pve-headers 后自动构建。" | tee -a $INSTALL_LOG; \
                echo "   可联网后执行: apt update && apt install pve-headers dkms" | tee -a $INSTALL_LOG; \
            fi; \
        else \
            echo "3. 跳过驱动包安装（未找到文件）。" > /dev/console; \
            echo "未找到驱动包文件，请手动安装。" > $INSTALL_LOG; \
        fi; \
        \
        # E. 【关键步骤】无论如何都更新 initramfs，使黑名单和模块列表生效
        echo "5. 更新系统启动镜像 (initramfs)..." > /dev/console; \
        update-initramfs -u -k all 2>&1 | tee -a $INSTALL_LOG; \
        echo "✅ initramfs 更新完成，黑名单将在下次启动时生效。" > /dev/console; \
        \
        echo "===== 安装后配置完成 =====" > /dev/console; \
        echo "请查看 $INSTALL_LOG 获取详细信息。" > /dev/console; \
        echo "提示：若首次启动后网卡灯不亮（因缺少头文件），请在联网后安装 pve-headers 并重启。" > /dev/console; \
    '\''; \
    echo "late_command 执行结束。" > /dev/console
EOF
          echo "✅ Preseed 配置文件已生成（含通用驱动搜索逻辑）。"

          echo ">>> 4. 智能判断引导模式"
          FULL_ISOLINUX=$(find work/iso -name isolinux.bin | head -1)
          FULL_GRUB_BIOS=$(find work/iso -name eltorito.img | head -1)
          FULL_EFI=$(find work/iso -name efi.img | head -1)
          if [ -z "$FULL_EFI" ]; then echo "❌ 找不到 efi.img"; exit 1; fi
          REL_EFI=${FULL_EFI#work/iso/}
          
          XORRISO_ARGS=""
          if [ -n "$FULL_ISOLINUX" ]; then
            echo "✅ 检测到旧版架构 (Isolinux)"
            REL_ISOLINUX=${FULL_ISOLINUX#work/iso/}
            REL_BOOT_CAT=$(dirname "$REL_ISOLINUX")/boot.cat
            HOST_MBR=$(find /usr -name isohdpfx.bin | head -1)
            XORRISO_ARGS="-isohybrid-mbr $HOST_MBR \
              -b $REL_ISOLINUX \
              -c $REL_BOOT_CAT \
              -boot-load-size 4 -boot-info-table -no-emul-boot \
              -eltorito-alt-boot \
              -e $REL_EFI \
              -no-emul-boot -isohybrid-gpt-basdat"
              
          elif [ -n "$FULL_GRUB_BIOS" ]; then
            echo "✅ 检测到新版架构 (Pure GRUB, PVE 8.2+)"
            REL_GRUB_BIOS=${FULL_GRUB_BIOS#work/iso/}
            XORRISO_ARGS="-b $REL_GRUB_BIOS \
              -no-emul-boot -boot-load-size 4 -boot-info-table --grub2-boot-info \
              -eltorito-alt-boot \
              -e $REL_EFI \
              -no-emul-boot -isohybrid-gpt-basdat"
              
          else
            echo "❌ 致命错误：找不到 Isolinux 也就罢了，连 GRUB 的 eltorito.img 也没找到！"
            echo ">>> 正在列出 /boot 目录结构供调试："
            find work/iso/boot -maxdepth 4
            exit 1
          fi

          echo ">>> 5. 打包 ISO"
          xorriso -as mkisofs \
            -r -V "$ISO_LABEL" \
            -o "$ISO_OUTPUT" \
            -J -joliet-long -cache-inodes \
            $XORRISO_ARGS \
            work/iso
            
          echo ">>> ISO 构建完成"
          ls -lh "$ISO_OUTPUT"
          sha256sum "$ISO_OUTPUT" | tee sha256.txt
          echo "SHA256=$(cut -d' ' -f1 sha256.txt)" >> $GITHUB_ENV
          
          # 添加ISO大小信息
          ISO_SIZE=$(stat -c%s "$ISO_OUTPUT")
          ISO_SIZE_MB=$((ISO_SIZE/1024/1024))
          echo "ISO_SIZE=$ISO_SIZE" >> $GITHUB_ENV
          echo "ISO_SIZE_MB=$ISO_SIZE_MB" >> $GITHUB_ENV
      # =========================
      # 发布 Release
      # =========================
      - name: Create GitHub Release
        if: ${{ steps.check-rebuild.outputs.skip_build != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pve-${{ env.PVE_VERSION }}-r8125
          name: PVE ${{ env.PVE_VERSION }} with RTL8125
          body: |
            - **PVE 版本**: ${{ env.PVE_VERSION }}
            - **RTL8125 驱动版本**: ${{ env.DRIVER_DISPLAY_VERSION }}
            - **文件大小**: ${{ env.ISO_SIZE_MB }} MB
            - **SHA256**: `${{ env.SHA256 }}`
            
            ## 🔧 核心改进：解决 Ventoy/离线安装问题
            - ✅ **通用驱动搜索**：自动扫描所有磁盘分区，彻底解决通过 **Ventoy** 启动时找不到驱动包的问题。
            - ✅ **黑名单优先**：无论驱动是否成功编译，均会**完全禁用冲突的 `r8169` 驱动**，防止其抢占网卡。
            - ✅ **离线安装友好**：允许在无网络、无内核头文件的环境下完成安装，驱动包会预置在系统中。
            - ✅ **明确的状态日志**：所有安装步骤记录在 `/root/r8125_post_install.log`，便于排查。
            
            ## 🚀 安装说明
            1. **写入U盘**：`dd if=PVE-${{ env.PVE_VERSION }}-r8125.iso of=/dev/sdX bs=4M`
            2. **启动安装**：从U盘启动，正常安装PVE。
            3. **驱动处理**：安装程序将**自动搜索并安装**RTL8125驱动。
            
            ## ⚠️ 重要提示（离线环境必读）
            **在无网络环境下首次启动**：
            - 网卡灯**可能不亮**，这是因为缺少 `pve-headers`，驱动**尚未编译**。
            - **这是正常现象**。系统已配置好黑名单和启动项，**只需联网后执行**：
            ```bash
            apt update && apt install pve-headers
            ```
            **然后重启**，驱动将自动编译并加载，网卡即可正常工作。
            
            ## 📋 安装后验证
            ```bash
            # 检查日志
            cat /root/r8125_post_install.log
            # 检查驱动
            lsmod | grep r8125
            # 检查网卡
            lspci -knn | grep -A2 -i realtek
            ```
          files: |
            ${{ env.ISO_OUTPUT }}
          draft: false
          prerelease: false
          generate_release_notes: false
      # =========================
      # 清理临时文件
