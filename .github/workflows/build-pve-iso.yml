name: Build and Release PVE ISO with RTL8125
on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '强制重新构建（即使版本相同）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      proxmox_iso_url:
        description: 'Proxmox ISO URL'
        required: true
        default: 'https://enterprise.proxmox.com/iso/proxmox-ve_9.1-1.iso'
      r8125_driver_url:
        description: 'RTL8125 Driver URL'
        required: true
        default: 'https://github.com/timeflysoon/realtek-r8125-dkms/releases/download/v9.016.01/realtek-r8125-dkms_9.016.01-1_amd64.deb'
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xorriso curl file jq isolinux
      
      - name: Parse ISO URL for filename
        run: |
          ISO_ORIG=$(basename "${{ inputs.proxmox_iso_url }}")
          echo "ISO_ORIG=$ISO_ORIG" >> $GITHUB_ENV

      - name: Cache Proxmox ISO
        id: cache-iso
        uses: actions/cache@v4
        with:
          path: ${{ env.ISO_ORIG }}
          key: pve-iso-${{ env.ISO_ORIG }}-${{ github.run_id }}
          restore-keys: |
            pve-iso-${{ env.ISO_ORIG }}

      - name: Download Proxmox ISO
        if: steps.cache-iso.outputs.cache-hit != 'true'
        run: |
          curl -fL --retry 3 -o "$ISO_ORIG" "${{ inputs.proxmox_iso_url }}"
          echo "✅ ISO 下载完成"
          ls -lh "$ISO_ORIG"

      - name: Verify ISO integrity
        if: steps.cache-iso.outputs.cache-hit != 'true'
        run: |
          ISO_SIZE=$(stat -c%s "$ISO_ORIG")
          if [ "$ISO_SIZE" -lt 1000000000 ]; then 
            echo "❌ ISO 文件过小，可能下载失败"
            exit 1
          fi
          if ! xorriso -indev "$ISO_ORIG" -toc 2>&1 | grep -q "Media summary"; then
            echo "❌ ISO 文件损坏或格式不正确"
            exit 1
          fi
          echo "✅ ISO 验证通过"

      - name: Parse configuration and setup variables
        run: |
          if [[ "$ISO_ORIG" =~ proxmox-ve_([0-9]+\.[0-9]+(-[0-9]+)?)\.iso$ ]]; then
            PVE_VERSION="${BASH_REMATCH[1]}"
            echo "PVE_VERSION=$PVE_VERSION" >> $GITHUB_ENV
            echo "ISO_OUTPUT=PVE-${PVE_VERSION}-r8125.iso" >> $GITHUB_ENV
          else
            echo "❌ 无法从 ISO 文件名提取版本号"
            exit 1
          fi

          ORIG_LABEL=$(blkid -o value -s LABEL "$ISO_ORIG")
          [ -z "$ORIG_LABEL" ] && ORIG_LABEL="PVE_${PVE_VERSION%.*}"
          echo "ISO_LABEL=$ORIG_LABEL" >> $GITHUB_ENV
          
          DRIVER_URL="${{ inputs.r8125_driver_url }}"
          if [[ "$DRIVER_URL" =~ https://github.com/([^/]+)/([^/]+)/releases/download/([^/]+)/(.+) ]]; then
            echo "DRIVER_OWNER=${BASH_REMATCH[1]}" >> $GITHUB_ENV
            echo "DRIVER_REPO=${BASH_REMATCH[2]}" >> $GITHUB_ENV
            echo "DRIVER_TAG=${BASH_REMATCH[3]}" >> $GITHUB_ENV
            FILENAME="${BASH_REMATCH[4]}"
            echo "DRIVER_FILENAME=$FILENAME" >> $GITHUB_ENV
            if [[ "$FILENAME" =~ realtek-r8125-dkms_([^_]+)_amd64\.deb ]]; then
              echo "DRIVER_DISPLAY_VERSION=${BASH_REMATCH[1]}" >> $GITHUB_ENV
            else
              echo "DRIVER_DISPLAY_VERSION=${BASH_REMATCH[3]}" >> $GITHUB_ENV
            fi
          else
            echo "❌ 无法解析驱动URL"
            exit 1
          fi

      - name: Check if rebuild is needed
        id: check-rebuild
        run: |
          SKIP=false
          if [ "${{ inputs.force_rebuild }}" = "true" ]; then
            echo ">>> 强制重新构建模式"
            RELEASE_INFO=$(curl -s -H "Authorization: token ${{ github.token }}" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/pve-${PVE_VERSION}-r8125")
            if [ "$(echo "$RELEASE_INFO" | jq -r '.message // "exists"')" != "Not Found" ]; then
              RELEASE_ID=$(echo "$RELEASE_INFO" | jq -r '.id')
              echo "删除 Release ID: $RELEASE_ID"
              curl -s -X DELETE -H "Authorization: token ${{ github.token }}" "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/$RELEASE_ID"
            fi
            SKIP=false
          else
            echo ">>> 检查现有 Release"
            RELEASE_INFO=$(curl -s -H "Authorization: token ${{ github.token }}" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/pve-${PVE_VERSION}-r8125")
            if [ "$(echo "$RELEASE_INFO" | jq -r '.message // "exists"')" != "Not Found" ]; then
              echo "✅ 已存在版本 ${PVE_VERSION}-r8125 的 Release，跳过构建"
              SKIP=true
            fi
          fi
          echo "skip_build=$SKIP" >> $GITHUB_OUTPUT

      - name: Download RTL8125 Driver from Private Repo
        if: ${{ steps.check-rebuild.outputs.skip_build != 'true' }}
        env:
          PAT: ${{ secrets.AUTH_PAT }}
        run: |
          set -e
          mkdir -p drivers
          echo ">>> 获取驱动下载链接"
          ASSET_URL=$(curl -s -H "Authorization: Bearer $PAT" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/repos/$DRIVER_OWNER/$DRIVER_REPO/releases/tags/$DRIVER_TAG" | jq -r ".assets[] | select(.name == \"$DRIVER_FILENAME\") | .url")
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "❌ 无法获取驱动下载链接"
            exit 1
          fi
          DRIVER_FILE="drivers/$DRIVER_FILENAME"
          echo "DRIVER_FILE=$DRIVER_FILE" >> $GITHUB_ENV
          echo ">>> 下载驱动文件"
          curl -fL -H "Authorization: Bearer $PAT" -H "Accept: application/octet-stream" --retry 3 -o "$DRIVER_FILE" "$ASSET_URL"
          echo "✅ 驱动下载完成"

      - name: Build Custom ISO
        if: steps.check-rebuild.outputs.skip_build != 'true'
        run: |
          rm -rf work && mkdir -p work/iso
          echo ">>> 1. 解包 ISO"
          xorriso -osirrox on -indev "$ISO_ORIG" -extract / work/iso
          chmod -R +w work/iso

          echo ">>> 2. 注入驱动"
          mkdir -p work/iso/pool/extras
          cp "$DRIVER_FILE" work/iso/pool/extras/
          
          echo ">>> 3. 配置 Preseed (极致静默识别 RTL8125)"
          PRESEED="work/iso/preseed.cfg"
          if [ -f "$PRESEED" ]; then
            grep -v "r8125" "$PRESEED" > "${PRESEED}.tmp" || true
            mv "${PRESEED}.tmp" "$PRESEED"
          fi
          
          cat >> "$PRESEED" << 'EOF'
d-i preseed/late_command string in-target sh -c '
  if lspci -n | grep -q "10ec:8125"; then
    dpkg -i /cdrom/pool/extras/*.deb > /dev/null 2>&1
    echo "blacklist r8169" > /etc/modprobe.d/blacklist-r8169.conf
    echo "options r8125 aspm=1" > /etc/modprobe.d/r8125.conf
    depmod -a > /dev/null 2>&1
    update-initramfs -u > /dev/null 2>&1
  fi
'
EOF

          echo ">>> 4. 引导模式自适应"
          FULL_EFI=$(find work/iso -name efi.img | head -1)
          if [ -z "$FULL_EFI" ]; then 
            echo "❌ 找不到 efi.img"
            exit 1
          fi
          REL_EFI=${FULL_EFI#work/iso/}
          
          FULL_ISOLINUX=$(find work/iso -name isolinux.bin | head -1)
          FULL_GRUB_BIOS=$(find work/iso -name eltorito.img | head -1)
          
          XORRISO_ARGS=""
          if [ -n "$FULL_ISOLINUX" ]; then
            echo "✅ 检测到旧版架构 (Isolinux)"
            REL_ISOLINUX=${FULL_ISOLINUX#work/iso/}
            REL_BOOT_CAT=$(dirname "$REL_ISOLINUX")/boot.cat
            HOST_MBR=$(find /usr -name isohdpfx.bin | head -1)
            XORRISO_ARGS="-isohybrid-mbr $HOST_MBR -b $REL_ISOLINUX -c $REL_BOOT_CAT -boot-load-size 4 -boot-info-table -no-emul-boot -eltorito-alt-boot -e $REL_EFI -no-emul-boot -isohybrid-gpt-basdat"
          elif [ -n "$FULL_GRUB_BIOS" ]; then
            echo "✅ 检测到新版架构 (Pure GRUB, PVE 8.2+)"
            REL_GRUB_BIOS=${FULL_GRUB_BIOS#work/iso/}
            XORRISO_ARGS="-b $REL_GRUB_BIOS -no-emul-boot -boot-load-size 4 -boot-info-table --grub2-boot-info -eltorito-alt-boot -e $REL_EFI -no-emul-boot -isohybrid-gpt-basdat"
          else
            echo "❌ 找不到引导文件"
            exit 1
          fi

          echo ">>> 5. 生成 ISO"
          xorriso -as mkisofs -r -V "$ISO_LABEL" -o "$ISO_OUTPUT" -J -joliet-long -cache-inodes $XORRISO_ARGS work/iso
          echo "✅ ISO 构建完成"
          sha256sum "$ISO_OUTPUT" | tee sha256.txt
          echo "SHA256=$(cut -d' ' -f1 sha256.txt)" >> $GITHUB_ENV

      - name: Create GitHub Release
        if: ${{ steps.check-rebuild.outputs.skip_build != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pve-${{ env.PVE_VERSION }}-r8125
          name: PVE ${{ env.PVE_VERSION }} with RTL8125
          body: |
            - **PVE 版本**: ${{ env.PVE_VERSION }}
            - **RTL8125 驱动版本**: ${{ env.DRIVER_DISPLAY_VERSION }}
            - **SHA256**: `${{ env.SHA256 }}`
            - **功能说明**: 自动识别 RTL8125 网卡并静默安装驱动，同时针对螃蟹网卡开启电源管理优化。
          files: ${{ env.ISO_OUTPUT }}
          draft: false
          prerelease: false
          generate_release_notes: false

      - name: Cleanup
        if: always()
        run: |
          echo "清理临时文件..."
          rm -rf work drivers sha256.txt
