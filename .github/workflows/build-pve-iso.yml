name: Build and Release PVE ISO with RTL8125
on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '强制重新构建（即使版本相同）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      proxmox_iso_url:
        description: 'Proxmox ISO URL'
        required: true
        default: 'https://enterprise.proxmox.com/iso/proxmox-ve_9.1-1.iso'
      r8125_driver_url:
        description: 'RTL8125 Driver URL'
        required: true
        default: 'https://github.com/timeflysoon/realtek-r8125-dkms/releases/download/v9.016.01/realtek-r8125-dkms_9.016.01-1_amd64.deb'
permissions:
  contents: write
# ============================【只需要修改这里】============================
# 注意：无需编辑此 YAML 文件。
# 要修改配置，请在触发 workflow 时通过 inputs 输入自定义 URL 值。
# 默认值已设置，如果不修改将使用默认。
# =======================================================================
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # 防止长时间挂起
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: |
          sudo apt-get update
          # 添加 isolinux 包以获取 isohdpfx.bin（为旧版 PVE 准备）
          sudo apt-get install -y xorriso curl file jq isolinux
      # =========================
      # 解析 ISO URL 以获取文件名（用于缓存和下载）
      # =========================
      - name: Parse ISO URL for filename
        run: |
          ISO_ORIG=$(basename "${{ inputs.proxmox_iso_url }}")
          echo "ISO_ORIG=$ISO_ORIG" >> $GITHUB_ENV
      # =========================
      # 缓存 Proxmox ISO
      # =========================
      - name: Cache Proxmox ISO
        id: cache-iso
        uses: actions/cache@v4
        with:
          path: ${{ env.ISO_ORIG }}
          key: pve-iso-${{ env.ISO_ORIG }}-${{ github.run_id }}
          restore-keys: |
            pve-iso-${{ env.ISO_ORIG }}
      # =========================
      # 下载 Proxmox ISO（如果未缓存）
      # =========================
      - name: Download Proxmox ISO
        if: steps.cache-iso.outputs.cache-hit != 'true'
        run: |
          curl -fL --retry 3 -o "$ISO_ORIG" "${{ inputs.proxmox_iso_url }}"
          echo ">>> ISO 文件信息："
          ls -lh "$ISO_ORIG"
          file "$ISO_ORIG"
      # =========================
      # 验证 ISO 完整性
      # =========================
      - name: Verify ISO integrity
        if: steps.cache-iso.outputs.cache-hit != 'true'
        run: |
          echo "验证 ISO 完整性..."
          ISO_SIZE=$(stat -c%s "$ISO_ORIG")
          if [ "$ISO_SIZE" -lt 1000000000 ]; then # 小于1GB
            echo "❌ ISO 文件过小，可能下载失败"
            exit 1
          fi
          
          # 检查 ISO 是否包含必要的目录
          if ! xorriso -indev "$ISO_ORIG" -toc 2>&1 | grep -q "Media summary"; then
            echo "❌ ISO 文件损坏或格式不正确"
            exit 1
          fi
          echo "✅ ISO 验证通过"
      # =========================
      # 解析配置（自动生成所有变量）
      # =========================
      - name: Parse configuration and setup variables
        run: |
          echo "ISO_ORIG=$ISO_ORIG"
          
          # 1. 解析 PVE 版本 (用于文件名)
          if [[ "$ISO_ORIG" =~ proxmox-ve_([0-9]+\.[0-9]+(-[0-9]+)?)\.iso$ ]]; then
            PVE_VERSION="${BASH_REMATCH[1]}"
            echo "PVE_VERSION=$PVE_VERSION" >> $GITHUB_ENV
            echo "ISO_OUTPUT=PVE-${PVE_VERSION}-r8125.iso" >> $GITHUB_ENV
          else
            echo "❌ 无法从 ISO 文件名提取版本号: $ISO_ORIG"
            echo "预期格式: proxmox-ve_X.Y-Z.iso"
            exit 1
          fi

          # 2. 【完美修正】使用 blkid 提取原版 ISO 卷标
          # blkid 能直接输出干净的 Label，无需正则清洗
          echo ">>> 提取原版 ISO 卷标..."
          ORIG_LABEL=$(blkid -o value -s LABEL "$ISO_ORIG")
          
          if [ -z "$ORIG_LABEL" ]; then
             echo "⚠️ 无法提取卷标，使用文件名推断"
             # 兜底：PVE 官方格式通常是 PVE_x.x
             ORIG_LABEL="PVE_${PVE_VERSION%.*}"
          fi
          
          echo "✅ 沿用原版卷标: $ORIG_LABEL"
          echo "ISO_LABEL=$ORIG_LABEL" >> $GITHUB_ENV
          
          # 3. 解析 RTL8125 驱动 URL
          DRIVER_URL="${{ inputs.r8125_driver_url }}"
          
          # 提取仓库、标签、文件名等信息
          # 格式: https://github.com/{owner}/{repo}/releases/download/{tag}/{filename}
          if [[ "$DRIVER_URL" =~ https://github.com/([^/]+)/([^/]+)/releases/download/([^/]+)/(.+) ]]; then
            OWNER="${BASH_REMATCH[1]}"
            REPO="${BASH_REMATCH[2]}"
            TAG="${BASH_REMATCH[3]}"
            FILENAME="${BASH_REMATCH[4]}"
            
            echo "DRIVER_OWNER=$OWNER" >> $GITHUB_ENV
            echo "DRIVER_REPO=$REPO" >> $GITHUB_ENV
            echo "DRIVER_TAG=$TAG" >> $GITHUB_ENV
            echo "DRIVER_FILENAME=$FILENAME" >> $GITHUB_ENV
            
            # 提取显示版本（从文件名中提取版本号）
            if [[ "$FILENAME" =~ realtek-r8125-dkms_([^_]+)_amd64\.deb ]]; then
              echo "DRIVER_DISPLAY_VERSION=${BASH_REMATCH[1]}" >> $GITHUB_ENV
            else
              # 如果文件名格式不匹配，使用标签作为版本
              echo "DRIVER_DISPLAY_VERSION=$TAG" >> $GITHUB_ENV
            fi
            
            echo ">>> 驱动解析结果："
            echo "所有者: $OWNER"
            echo "仓库: $REPO"
            echo "标签: $TAG"
            echo "文件名: $FILENAME"
            echo "显示版本: $DRIVER_DISPLAY_VERSION"
          else
            echo "❌ 无法解析驱动URL: $DRIVER_URL"
            echo "URL 格式应为: https://github.com/owner/repo/releases/download/tag/filename"
            exit 1
          fi
      # =========================
      # 检查是否需要重建（修正：强制重建时删除已存在的 Release）
      # =========================
      - name: Check if rebuild is needed
        id: check-rebuild
        run: |
          SKIP=false
          if [ "${{ inputs.force_rebuild }}" = "true" ]; then
            echo ">>> 强制重新构建模式"
            
            # 删除已存在的 Release（幂等操作）
            echo "检查并删除已存在的 Release..."
            RELEASE_INFO=$(curl -s \
              -H "Authorization: token ${{ github.token }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/pve-${PVE_VERSION}-r8125")
            
            if [ "$(echo "$RELEASE_INFO" | jq -r '.message // "exists"')" != "Not Found" ]; then
              RELEASE_ID=$(echo "$RELEASE_INFO" | jq -r '.id')
              echo "删除 Release ID: $RELEASE_ID"
              curl -s -X DELETE \
                -H "Authorization: token ${{ github.token }}" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/$RELEASE_ID"
              echo "✅ 已删除现有的 Release"
            else
              echo "✅ 没有现有的 Release 需要删除"
            fi
            
            SKIP=false
          else
            echo ">>> 检查现有 Release"
            RELEASE_INFO=$(curl -s \
              -H "Authorization: token ${{ github.token }}" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/pve-${PVE_VERSION}-r8125")
            
            if [ "$(echo "$RELEASE_INFO" | jq -r '.message // "exists"')" != "Not Found" ]; then
              echo "✅ 已存在版本 ${PVE_VERSION}-r8125 的 Release，跳过构建"
              SKIP=true
            else
              echo ">>> 未找到现有 Release，继续构建"
            fi
          fi
          echo "skip_build=$SKIP" >> $GITHUB_OUTPUT
      # =========================
      # 下载私有仓库 RTL8125 DKMS
      # =========================
      - name: Download RTL8125 Driver from Private Repo
        if: ${{ steps.check-rebuild.outputs.skip_build != 'true' }}
        env:
          PAT: ${{ secrets.AUTH_PAT }}
        run: |
          set -e
          mkdir -p drivers
          
          echo ">>> 驱动下载配置"
          echo "完整URL: ${{ inputs.r8125_driver_url }}"
          echo "仓库: $DRIVER_OWNER/$DRIVER_REPO"
          echo "标签: $DRIVER_TAG"
          echo "文件名: $DRIVER_FILENAME"
          
          echo ">>> 通过 GitHub API 获取资源下载URL"
          
          # 使用 GitHub API 获取资源的真实下载URL
          ASSET_URL=$(curl -s \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$DRIVER_OWNER/$DRIVER_REPO/releases/tags/$DRIVER_TAG" \
            | jq -r ".assets[] | select(.name == \"$DRIVER_FILENAME\") | .url")
          
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" = "null" ]; then
            echo "❌ 无法获取资源URL，请检查："
            echo " 1. 仓库是否存在: $DRIVER_OWNER/$DRIVER_REPO"
            echo " 2. 标签是否正确: $DRIVER_TAG"
            echo " 3. 文件名是否正确: $DRIVER_FILENAME"
            echo " 4. PAT 是否有访问权限"
            exit 1
          fi
          
          echo "✅ 资源API URL 获取成功"
          DRIVER_FILE="drivers/$DRIVER_FILENAME"
          echo "DRIVER_FILE=$DRIVER_FILE" >> $GITHUB_ENV
          
          echo ">>> 下载驱动文件"
          
          # 使用 API URL 下载，需要添加 Accept header
          curl -fL \
            -H "Authorization: Bearer $PAT" \
            -H "Accept: application/octet-stream" \
            --retry 3 \
            -o "$DRIVER_FILE" \
            "$ASSET_URL"
          
          echo "✅ 驱动下载完成"
          echo ">>> 驱动文件信息:"
          ls -lh "$DRIVER_FILE"
          file "$DRIVER_FILE"
          
          SIZE=$(stat -c%s "$DRIVER_FILE")
          echo "驱动大小: $SIZE bytes"
          
          if [ "$SIZE" -lt 50000 ]; then
            echo "❌ 驱动文件过小，可能下载失败"
            exit 1
          fi
      # =========================
      # 构建 ISO (智能适配 PVE 8.2+ 纯GRUB架构)
      # =========================
      - name: Build Custom ISO
        if: steps.check-rebuild.outputs.skip_build != 'true'
        run: |
          rm -rf work && mkdir -p work/iso
          
          echo ">>> 1. 解包 ISO"
          xorriso -osirrox on -indev "$ISO_ORIG" -extract / work/iso
          chmod -R +w work/iso

          echo ">>> 2. 注入驱动"
          # 在多个位置放置驱动包，确保安装程序能找到
          mkdir -p work/iso/pool/extras
          mkdir -p work/iso/pool/non-free
          cp "$DRIVER_FILE" work/iso/pool/extras/
          cp "$DRIVER_FILE" work/iso/pool/non-free/
          cp "$DRIVER_FILE" work/iso/

          echo ">>> 3. 配置 Preseed（增强版驱动自动安装）"
          PRESEED="work/iso/preseed.cfg"
          cat > "$PRESEED" << 'EOF'
          # PVE 自动安装配置 - 增强版 RTL8125 驱动集成
          d-i partman/early_command string debconf-set partman-auto/disk "$(list-devices disk | head -1)"
          
          # 关键：late_command 在安装完成后执行
          d-i preseed/late_command string \
            # 挂载安装介质
            sh -c 'mount /dev/sr0 /media/cdrom 2>/dev/null || mount /cdrom /media/cdrom 2>/dev/null || true; \
            \
            # 进入目标系统环境
            in-target sh -c '\'' \
              echo "开始安装后配置..." > /root/post-install.log; \
              \
              # 检查RTL8125网卡是否存在
              if lspci -nn | grep -q "10ec:8125"; then \
                echo "检测到 RTL8125 网卡 (10ec:8125)" >> /root/post-install.log; \
                \
                # 搜索驱动包 - 多个可能的位置
                DRIVER_DEB=""; \
                for SEARCH_PATH in /media/cdrom /media/cdrom/pool/extras /media/cdrom/pool/non-free /cdrom /cdrom/pool/extras /cdrom/pool/non-free; do \
                  if [ -f "$SEARCH_PATH/"*r8125*.deb ]; then \
                    DRIVER_DEB=$(ls "$SEARCH_PATH/"*r8125*.deb 2>/dev/null | head -1); \
                    break; \
                  fi; \
                done; \
                \
                if [ -n "$DRIVER_DEB" ]; then \
                  echo "找到驱动包: $DRIVER_DEB" >> /root/post-install.log; \
                  \
                  # 安装驱动包（强制安装，忽略依赖问题）
                  dpkg --force-depends -i "$DRIVER_DEB" 2>&1 | tee -a /root/post-install.log; \
                  \
                  # 强制写入/etc/modules（确保启动时加载r8125）
                  if ! grep -q "^r8125" /etc/modules 2>/dev/null; then \
                    echo "r8125" >> /etc/modules; \
                    echo "已将 r8125 添加到 /etc/modules" >> /root/post-install.log; \
                  fi; \
                  \
                  # 创建更强的黑名单配置
                  cat > /etc/modprobe.d/r8125-blacklist.conf << "EOL" \
                  # 完全禁用原生 r8169 驱动，避免与 r8125 冲突 \
                  blacklist r8169 \
                  install r8169 /bin/true \
                  # 别名也禁用 \
                  alias pci:v000010ECd00008169sv*sd*bc*sc*i* r8125 \
                  EOL \
                  \
                  echo "已创建黑名单配置" >> /root/post-install.log; \
                  \
                  # 检查内核头文件状态
                  KERNEL_VERSION=$(uname -r); \
                  HEADERS_PATH="/lib/modules/$KERNEL_VERSION/build"; \
                  \
                  if [ -d "$HEADERS_PATH" ] && [ -f "$HEADERS_PATH/Makefile" ]; then \
                    echo "内核头文件存在，尝试编译驱动..." >> /root/post-install.log; \
                    \
                    # 强制重新构建DKMS模块
                    if command -v dkms >/dev/null 2>&1; then \
                      dkms remove r8125 -a 2>/dev/null || true; \
                      dkms add r8125 2>/dev/null || true; \
                      dkms build r8125 2>&1 | tee -a /root/post-install.log; \
                      dkms install r8125 2>&1 | tee -a /root/post-install.log; \
                    fi; \
                  else \
                    echo "警告：内核头文件不存在 ($HEADERS_PATH)" >> /root/post-install.log; \
                    echo "驱动将在安装 pve-headers 后自动构建" >> /root/post-install.log; \
                    echo "可以执行：apt update && apt install pve-headers" >> /root/post-install.log; \
                  fi; \
                  \
                  # 更新initramfs（关键步骤！）
                  echo "更新 initramfs..." >> /root/post-install.log; \
                  update-initramfs -u -k all 2>&1 | tee -a /root/post-install.log; \
                  \
                  # 运行depmod
                  depmod -a 2>&1 | tee -a /root/post-install.log; \
                  \
                  # 尝试立即加载驱动
                  modprobe -r r8169 2>/dev/null || true; \
                  if modprobe r8125 2>/dev/null; then \
                    echo "✅ RTL8125 驱动加载成功！" >> /root/post-install.log; \
                    echo "网卡状态：" >> /root/post-install.log; \
                    ip link show 2>/dev/null | grep -A2 "enp\|eth" >> /root/post-install.log; \
                  else \
                    echo "⚠️  驱动加载失败，可能需要重启" >> /root/post-install.log; \
                    echo "请检查: dkms status" >> /root/post-install.log; \
                  fi; \
                  \
                else \
                  echo "错误：未找到驱动包！" >> /root/post-install.log; \
                  echo "搜索路径: /media/cdrom /cdrom" >> /root/post-install.log; \
                  ls -la /media/cdrom/* 2>/dev/null >> /root/post-install.log || true; \
                fi; \
              else \
                echo "未检测到 RTL8125 网卡，跳过驱动安装" >> /root/post-install.log; \
              fi; \
              \
              echo "安装后配置完成" >> /root/post-install.log; \
            '\'' \
            \
            # 卸载安装介质 \
            umount /media/cdrom 2>/dev/null || true; \
            echo "late_command 执行完成"'
          EOF
          echo "✅ 自动安装配置已添加（含增强型驱动集成）"

          echo ">>> 4. 智能判断引导模式 (关键修复)"
          
          # 寻找 EFI 引导文件 (所有版本都有)
          FULL_EFI=$(find work/iso -name efi.img | head -1)
          if [ -z "$FULL_EFI" ]; then echo "❌ 找不到 efi.img"; exit 1; fi
          REL_EFI=${FULL_EFI#work/iso/}
          echo "EFI Image: $REL_EFI"

          # 寻找 Legacy BIOS 引导文件 (Isolinux vs GRUB)
          FULL_ISOLINUX=$(find work/iso -name isolinux.bin | head -1)
          FULL_GRUB_BIOS=$(find work/iso -name eltorito.img | head -1)
          
          XORRISO_ARGS=""

          if [ -n "$FULL_ISOLINUX" ]; then
            echo "✅ 检测到旧版架构 (Isolinux)"
            REL_ISOLINUX=${FULL_ISOLINUX#work/iso/}
            REL_BOOT_CAT=$(dirname "$REL_ISOLINUX")/boot.cat
            
            # 寻找宿主机 MBR 模板
            HOST_MBR=$(find /usr -name isohdpfx.bin | head -1)
            
            XORRISO_ARGS="-isohybrid-mbr $HOST_MBR \
              -b $REL_ISOLINUX \
              -c $REL_BOOT_CAT \
              -boot-load-size 4 -boot-info-table -no-emul-boot \
              -eltorito-alt-boot \
              -e $REL_EFI \
              -no-emul-boot -isohybrid-gpt-basdat"
              
          elif [ -n "$FULL_GRUB_BIOS" ]; then
            echo "✅ 检测到新版架构 (Pure GRUB, PVE 8.2+)"
            
            REL_GRUB_BIOS=${FULL_GRUB_BIOS#work/iso/}
            
            # 纯 GRUB 模式下，不需要宿主机的 isohdpfx.bin，也不需要 boot.cat
            # 使用 --grub2-boot-info 参数
            
            XORRISO_ARGS="-b $REL_GRUB_BIOS \
              -no-emul-boot -boot-load-size 4 -boot-info-table --grub2-boot-info \
              -eltorito-alt-boot \
              -e $REL_EFI \
              -no-emul-boot -isohybrid-gpt-basdat"
              
          else
            echo "❌ 致命错误：找不到 Isolinux 也就罢了，连 GRUB 的 eltorito.img 也没找到！"
            echo ">>> 正在列出 /boot 目录结构供调试："
            find work/iso/boot -maxdepth 4
            exit 1
          fi

          echo ">>> 5. 打包 ISO"
          xorriso -as mkisofs \
            -r -V "$ISO_LABEL" \
            -o "$ISO_OUTPUT" \
            -J -joliet-long -cache-inodes \
            $XORRISO_ARGS \
            work/iso
            
          echo ">>> ISO 构建完成"
          ls -lh "$ISO_OUTPUT"
          sha256sum "$ISO_OUTPUT" | tee sha256.txt
          echo "SHA256=$(cut -d' ' -f1 sha256.txt)" >> $GITHUB_ENV
          
          # 添加ISO大小信息
          ISO_SIZE=$(stat -c%s "$ISO_OUTPUT")
          ISO_SIZE_MB=$((ISO_SIZE/1024/1024))
          echo "ISO_SIZE=$ISO_SIZE" >> $GITHUB_ENV
          echo "ISO_SIZE_MB=$ISO_SIZE_MB" >> $GITHUB_ENV
      # =========================
      # 发布 Release
      # =========================
      - name: Create GitHub Release
        if: ${{ steps.check-rebuild.outputs.skip_build != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pve-${{ env.PVE_VERSION }}-r8125
          name: PVE ${{ env.PVE_VERSION }} with RTL8125
          body: |
            - **PVE 版本**: ${{ env.PVE_VERSION }}
            - **RTL8125 驱动版本**: ${{ env.DRIVER_DISPLAY_VERSION }}
            - **文件大小**: ${{ env.ISO_SIZE_MB }} MB
            - **SHA256**: `${{ env.SHA256 }}`
            
            ## 🔧 增强功能
            - ✅ 集成 RTL8125 2.5G 网卡驱动
            - ✅ 自动检测 RTL8125 硬件并安装驱动
            - ✅ 自动禁用原生 r8169 驱动（防止冲突）
            - ✅ 自动添加到 /etc/modules 确保启动加载
            - ✅ 更新 initramfs 确保驱动在启动时可用
            - ✅ 支持 USB 混合引导（ISO 直接写入U盘即可启动）
            
            ## 🚀 安装说明
            1. 将 ISO 写入 U 盘：`dd if=PVE-${{ env.PVE_VERSION }}-r8125.iso of=/dev/sdX bs=4M`
            2. 从 U 盘启动安装 PVE
            3. 系统会自动检测 RTL8125 网卡并安装驱动
            4. 安装完成后网卡即可正常使用
            
            ## ⚠️ 注意事项
            - 如果安装后网卡仍未识别，请检查是否安装了 pve-headers
            - 可执行 `dkms status` 查看驱动编译状态
            - 需要重启系统以使驱动完全生效
            
            ## 📋 验证命令
            ```bash
            # 检查驱动是否加载
            lsmod | grep r8125
            
            # 检查网卡状态
            lspci -nn | grep -i realtek
            
            # 检查网络接口
            ip link show
            ```
          files: |
            ${{ env.ISO_OUTPUT }}
          draft: false
          prerelease: false
          generate_release_notes: false
      # =========================
      # 清理临时文件
      # =========================
      - name: Cleanup
        if: always()
        run: |
          echo "清理临时文件..."
          rm -rf work drivers sha256.txt "$ISO_OUTPUT"
          # 可选：保留原始 ISO 用于缓存和调试，不删除
          # rm -f "$ISO_ORIG"

# ═════════════════════════════════════
# 修改proxmox_iso_url：升级PVE版本
# 修改r8125_driver_url：更换/升级驱动
# 设置force_rebuild为true：强制重新构建
# ═════════════════════════════════════
