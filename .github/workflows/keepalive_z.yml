name: Z-Account Auto KeepAlive

on:
  schedule:
    # 每天 0点, 6点, 12点, 18点 触发
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  run-z-account:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Requests
        run: pip install requests

      - name: Random Delay
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo ">>> Manual Trigger: Skipping delay."
            exit 0
          else
            # 随机等待 0-60 分钟
            WAIT_SEC=$((RANDOM % 3600))
            echo "Sleeping for ${WAIT_SEC} seconds"
            sleep $WAIT_SEC
          fi

      - name: Run Script for Account Z
        env:
          # 【这里是修复的关键】
          # 左边是脚本要的通用名 (CLIENT_ID)
          # 右边是你仓库里存的私房钱 (secrets.Z_CLIENT_ID)
          CLIENT_ID: ${{ secrets.Z_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.Z_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.Z_REFRESH_TOKEN }}
          TENANT_ID: ${{ secrets.Z_TENANT_ID }}
        run: python main.py
