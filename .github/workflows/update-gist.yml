name: Auto Update Gist with Airport Subscription

on:
  schedule:
    - cron: '0 0 * * 1'   # 每周一 00:00 UTC（北京时间 08:00）
  workflow_dispatch:
    inputs:
      sub_url:
        description: '机场订阅链接（留空使用默认）'
        required: false
        default: ''
      force_update:
        description: '强制更新（即使内容完全一致）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  update-gist:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch subscription and update Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_FILE: "duobao.yaml"
        run: |
          python - << 'EOF'
          import requests
          import hashlib
          import os
          import sys
          import time
          from datetime import datetime

          print("🚀 Gist 自动更新任务开始")
          print("=" * 60)

          # ===== 基本环境变量 =====
          token = os.getenv("GIST_TOKEN")
          gist_id = os.getenv("GIST_ID")
          gist_file = os.getenv("GIST_FILE")

          if not token or not gist_id:
              print("❌ GIST_TOKEN 或 GIST_ID 未设置")
              sys.exit(1)

          sub_url_input = "${{ inputs.sub_url }}".strip()
          force_update = "${{ inputs.force_update }}" == "true"

          print(f"📄 Gist ID      : {gist_id}")
          print(f"📄 Gist 文件   : {gist_file}")
          print(f"⚡ 强制更新    : {force_update}")

          # ===== 默认订阅源 =====
          default_sub_urls = [
              "http://dbsub2.whtjdasha.com/s/b6ea7e4e77c3037cc6ffd6de407c04d6",
              "https://raw.githubusercontent.com/freefq/free/master/v2",
              "https://getafreenode.com/subscribe.php?subtype=1",
          ]

          target_urls = [sub_url_input] if sub_url_input else default_sub_urls

          headers_github = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github.v3+json",
          }

          # ===== 1. 获取当前 Gist =====
          print("\n1️⃣ 获取当前 Gist 内容...")
          gist_api = f"https://api.github.com/gists/{gist_id}"
          r = requests.get(gist_api, headers=headers_github, timeout=10)
          if r.status_code != 200:
              print(f"❌ 获取 Gist 失败: {r.status_code}")
              sys.exit(1)

          gist = r.json()
          if gist_file not in gist["files"]:
              print(f"❌ Gist 中不存在文件: {gist_file}")
              sys.exit(1)

          old_content = gist["files"][gist_file]["content"]
          old_hash = hashlib.sha256(old_content.encode()).hexdigest()
          print(f"✅ 当前 Gist 哈希: {old_hash[:12]}...")

          # ===== 2. 拉取订阅（不做格式校验）=====
          print("\n2️⃣ 拉取订阅内容...")
          new_content = None

          session = requests.Session()
          session.headers.update({
              "User-Agent": "Mozilla/5.0",
              "Accept": "*/*",
          })

          for i, url in enumerate(target_urls, 1):
              print(f"\n➡️ 尝试 {i}/{len(target_urls)}: {url}")
              try:
                  resp = session.get(url, timeout=20, verify=False)
                  print(f"   HTTP 状态码: {resp.status_code}")
                  resp.raise_for_status()

                  content = resp.text.rstrip()
                  print(f"   内容长度  : {len(content)}")

                  if content:
                      new_content = content
                      print("   ✅ 成功获取订阅内容")
                      break
                  else:
                      print("   ⚠️ 返回内容为空")

              except Exception as e:
                  print(f"   ❌ 获取失败: {e}")
                  time.sleep(2)

          if new_content is None:
              print("\n❌ 所有订阅源失败，终止更新（不再回退旧内容）")
              sys.exit(1)

          new_hash = hashlib.sha256(new_content.encode()).hexdigest()
          print(f"\n🆕 新内容哈希: {new_hash[:12]}...")
          print(f"🔍 内容是否相同: {new_hash == old_hash}")

          # ===== 3. 是否需要更新 =====
          if new_hash == old_hash and not force_update:
              print("⏭️ 内容一致，且未开启强制更新，跳过 PATCH")
              sys.exit(0)

          # ===== 4. 更新 Gist =====
          print("\n4️⃣ 更新 Gist...")
          now = datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")

          payload = {
              "description": f"Auto update - {now}",
              "files": {
                  gist_file: {
                      "content": new_content
                  }
              }
          }

          r = requests.patch(gist_api, headers=headers_github, json=payload, timeout=10)
          if r.status_code not in (200, 201):
              print(f"❌ 更新失败: {r.status_code}")
              print(r.text)
              sys.exit(1)

          print("✅ Gist 更新成功！")
          print(f"🔗 https://gist.github.com/{gist_id}")
          print("=" * 60)
          print("🎉 任务完成")
          EOF
