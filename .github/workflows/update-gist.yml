name: Auto Update Gist with Airport Subscription

on:
  schedule:
    - cron: '0 0 * * 1'   # 每周一 00:00 UTC（北京时间 08:00）
  workflow_dispatch:
    inputs:
      sub_url:
        description: '机场订阅链接（留空使用默认列表）'
        required: false
        default: ''
      force_update:
        description: '强制更新（即使内容完全一致）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  update-gist:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Fetch subscription and update Gist
        env:
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_FILE: "duobao.yaml"
        run: |
          python - << 'EOF'
          import requests
          import hashlib
          import os
          import sys
          import time
          from datetime import datetime

          print("🚀 Gist 自动更新任务开始")
          print("=" * 60)

          # ===== 基本环境变量 =====
          token = os.getenv("GIST_TOKEN")
          gist_id = os.getenv("GIST_ID")
          gist_file = os.getenv("GIST_FILE")

          if not token or not gist_id:
              print("❌ GIST_TOKEN 或 GIST_ID 未设置")
              sys.exit(1)

          sub_url_input = "${{ inputs.sub_url }}".strip()
          force_update = "${{ inputs.force_update }}" == "true"

          print(f"📄 Gist ID      : {gist_id}")
          print(f"📄 Gist 文件   : {gist_file}")
          print(f"⚡ 强制更新    : {force_update}")

          # ===== 默认订阅源列表（可在此处增删） =====
          default_sub_urls = [
              "https://dbsub2.whtjdasha.com/s/b6ea7e4e77c3037cc6ffd6de407c04d6",
              "https://raw.githubusercontent.com/freefq/free/master/v2",
              "https://getafreenode.com/subscribe.php?subtype=1",
          ]

          # 决定使用哪个URL列表：输入优先，否则用默认列表
          target_urls = [sub_url_input] if sub_url_input else default_sub_urls

          # GitHub API 请求头
          headers_github = {
              "Authorization": f"token {token}",
              "Accept": "application/vnd.github.v3+json",
          }

          # ===== 1. 获取当前 Gist 内容 =====
          print("\n1️⃣ 获取当前 Gist 内容...")
          gist_api = f"https://api.github.com/gists/{gist_id}"
          try:
              r = requests.get(gist_api, headers=headers_github, timeout=15)
              r.raise_for_status()
              gist = r.json()
          except Exception as e:
              print(f"❌ 获取 Gist 失败: {e}")
              sys.exit(1)

          if gist_file not in gist["files"]:
              print(f"❌ Gist 中不存在文件: {gist_file}")
              sys.exit(1)

          old_content = gist["files"][gist_file]["content"]
          old_hash = hashlib.sha256(old_content.encode()).hexdigest()
          print(f"✅ 当前 Gist 哈希: {old_hash[:12]}...")

          # ===== 2. 拉取订阅内容（核心部分）=====
          print("\n2️⃣ 拉取订阅内容...")
          new_content = None

          # 定义模拟真实浏览器的请求头模板
          BROWSER_HEADERS_TEMPLATE = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8",
              "Accept-Language": "zh-CN,zh;q=0.9,en;q=0.8",
              "Accept-Encoding": "gzip, deflate",
              "Connection": "keep-alive",
              "Upgrade-Insecure-Requests": "1",
              "Cache-Control": "no-cache",
              "Pragma": "no-cache",
              "Referer": "https://www.google.com/",
              "Sec-Fetch-Dest": "document",
              "Sec-Fetch-Mode": "navigate",
              "Sec-Fetch-Site": "cross-site",
          }

          # 遍历所有目标URL
          for url_index, url in enumerate(target_urls, 1):
              print(f"\n➡️ 尝试 URL {url_index}/{len(target_urls)}: {url}")
              
              # 对每个URL进行最多3次重试
              max_retries_per_url = 3
              for retry_count in range(max_retries_per_url):
                  try:
                      # 每次重试创建新会话，避免连接残留问题
                      session = requests.Session()
                      
                      # 复制并微调请求头（例如轻微改变User-Agent版本号）
                      current_headers = BROWSER_HEADERS_TEMPLATE.copy()
                      if retry_count > 0:
                          # 第二次及以后重试时，微调Chrome版本号
                          current_headers["User-Agent"] = current_headers["User-Agent"].replace(
                              "Chrome/120", f"Chrome/12{retry_count}"
                          )
                      
                      session.headers.update(current_headers)
                      session.cookies.clear()  # 从空Cookie开始
                      
                      print(f"   第 {retry_count + 1} 次请求 (超时: 30秒)...")
                      
                      # 主要尝试（使用SSL验证）
                      resp = session.get(url, timeout=30)
                      print(f"   HTTP 状态码: {resp.status_code}")
                      resp.raise_for_status()
                      
                      content = resp.text.rstrip()
                      print(f"   获取内容长度: {len(content)} 字符")
                      
                      # 简单有效性检查：非空且有一定长度
                      if content and len(content) > 100:
                          new_content = content
                          print("   ✅ 成功获取有效订阅内容")
                          break  # 跳出当前URL的重试循环
                      else:
                          print("   ⚠️ 返回内容过短或为空，可能无效")
                          # 内容无效也跳出重试，尝试下一个URL
                          break
                          
                  except requests.exceptions.SSLError:
                      # SSL证书错误，尝试关闭验证（不推荐但作为后备）
                      print("   ⚠️  SSL证书错误，尝试关闭验证重试...")
                      try:
                          resp = session.get(url, timeout=30, verify=False)
                          resp.raise_for_status()
                          content = resp.text.rstrip()
                          if content and len(content) > 100:
                              new_content = content
                              print("   ✅ (通过非安全连接) 成功获取订阅内容")
                              break
                          else:
                              print("   ⚠️ (非安全连接) 返回内容过短或为空")
                              break
                      except Exception as e:
                          print(f"   ❌ (非安全连接) 获取失败: {type(e).__name__}")
                  except Exception as e:
                      print(f"   ❌ 第 {retry_count + 1} 次请求失败: {type(e).__name__}")
                      
                  # 重试等待逻辑（指数退避）
                  if retry_count < max_retries_per_url - 1:
                      wait_seconds = 2 ** (retry_count + 1)  # 2, 4, 8秒...
                      print(f"   等待 {wait_seconds} 秒后重试...")
                      time.sleep(wait_seconds)
                  else:
                      print(f"   💥 该URL已重试{max_retries_per_url}次，均失败。")
              
              # 如果已获取到新内容，跳出URL循环
              if new_content is not None:
                  break
          
          # ===== 3. 检查是否成功拉取到内容 =====
          if new_content is None:
              print("\n❌ 所有订阅源均失败，无法获取新内容。")
              print("💡 可能原因：")
              print("   1. 订阅链接暂时不可访问或已失效")
              print("   2. 服务器屏蔽了GitHub Actions的IP段")
              print("   3. 网络连接问题")
              print("\n⚠️  终止更新，保留现有Gist内容。")
              sys.exit(1)
          
          # ===== 4. 计算哈希并判断是否需要更新 =====
          new_hash = hashlib.sha256(new_content.encode()).hexdigest()
          print(f"\n🆕 新内容哈希: {new_hash[:12]}...")
          print(f"🔍 与旧内容哈希比较结果: {'相同' if new_hash == old_hash else '不同'}")
          
          if new_hash == old_hash and not force_update:
              print("\n⏭️ 内容完全一致，且未开启强制更新，跳过更新。")
              print("=" * 60)
              print("🏁 任务结束（无变更）")
              sys.exit(0)
          
          # ===== 5. 执行 Gist 更新 =====
          print("\n5️⃣ 正在更新 Gist...")
          now = datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S UTC")
          
          update_payload = {
              "description": f"Auto updated - {now}",
              "files": {
                  gist_file: {
                      "content": new_content
                  }
              }
          }
          
          try:
              r = requests.patch(
                  gist_api,
                  headers=headers_github,
                  json=update_payload,
                  timeout=15
              )
              r.raise_for_status()
              print("✅ Gist 更新成功！")
              print(f"🔗 查看地址: https://gist.github.com/{gist_id}")
          except Exception as e:
              print(f"❌ 更新 Gist 失败: {e}")
              if hasattr(r, 'text'):
                  print(f"   错误详情: {r.text[:200]}")
              sys.exit(1)
          
          print("=" * 60)
          print("🎉 任务完成！Gist 内容已更新。")
          EOF
