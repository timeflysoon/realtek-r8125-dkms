name: Build PVE ISO with RTL8125 (Cloud Only)

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '强制重新构建（即使版本相同）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      proxmox_iso_filename:
        description: 'Proxmox ISO 文件名（在 OneDrive 中）'
        required: true
        default: 'proxmox-ve_9.1-1.iso'
      r8125_driver_filename:
        description: 'RTL8125 驱动文件名（在 OneDrive 中）'
        required: true
        default: 'realtek-r8125-dkms_9.016.01-1_amd64.deb'
      pve_custom_iso_link:
        description: 'OneDrive PVE-Custom-ISO 共享链接'
        required: true
        default: 'https://xs9888outlook-my.sharepoint.com/:f:/g/personal/x_xs9888outlook_onmicrosoft_com/IgDbCSpeCVNMS4wp8VLWaZ7PAXUWbl4eKahM-Blf17ZBJT8?e=EEVfKf'

permissions:
  contents: write

env:
  OD_CLIENT_ID: ${{ secrets.OD_CLIENT_ID }}
  OD_CLIENT_SECRET: ${{ secrets.OD_CLIENT_SECRET }}
  OD_TENANT_ID: ${{ secrets.OD_TENANT_ID }}
  SHARED_LINK: ${{ github.event.inputs.pve_custom_iso_link }}

jobs:
  build:
    runs-on: windows-latest
    env:
      SHARED_LINK: "https://xs9888outlook-my.sharepoint.com/:f:/g/personal/x_xs9888outlook_onmicrosoft_com/IgDbCSpeCVNMS4wp8VLWaZ7PAXUWbl4eKahM-Blf17ZBJT8?e=EEVfKf"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.AUTH_PAT }}

    - name: Install dependencies for PVE ISO
      shell: pwsh
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $OutputEncoding = [System.Text.Encoding]::UTF8
        Write-Host "=== 安装 PVE ISO 构建依赖 ==="
        
        # 安装 WSL 并设置 Ubuntu
        Write-Host "安装 WSL 和 Ubuntu..."
        wsl --install -d Ubuntu -y
        Start-Sleep -Seconds 30
        
        # 在 WSL 中安装必要的工具
        wsl bash -c "sudo apt-get update && sudo apt-get install -y xorriso curl file jq"
        
        # 检查是否安装成功
        wsl bash -c "which xorriso"
        wsl bash -c "xorriso --version"

    # 步骤一：获取驱动信息（只用一次）
    - name: Get Drive and Folder Information
      shell: pwsh
      id: get_drive_info
      run: |
        Write-Host "=== 获取驱动和文件夹信息 ==="
        
        $tokenUrl = "https://login.microsoftonline.com/$env:OD_TENANT_ID/oauth2/v2.0/token"
        $body = @{
            client_id     = $env:OD_CLIENT_ID
            scope         = "https://graph.microsoft.com/.default"
            client_secret = $env:OD_CLIENT_SECRET
            grant_type    = "client_credentials"
        }
        
        Write-Host "正在获取访问令牌..."
        try {
            $tokenResponse = Invoke-RestMethod -Method Post -Uri $tokenUrl -Body $body -ContentType "application/x-www-form-urlencoded"
            $token = ($tokenResponse.access_token).Trim()
            
            if ([string]::IsNullOrEmpty($token)) {
                throw "获取到的访问令牌为空"
            }
            Write-Host "✓ 访问令牌获取成功，长度: $($token.Length) 字符"
        } catch {
            Write-Error "获取访问令牌失败: $_"
            throw
        }
        
        Write-Host "正在解析共享链接..."
        $encodedLink = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($env:SHARED_LINK)).TrimEnd("=")
        $shareUrl = "https://graph.microsoft.com/v1.0/shares/u!$encodedLink/driveItem"
        
        try {
            $headers = @{ Authorization = "Bearer $token" }
            $driveItem = Invoke-RestMethod -Uri $shareUrl -Headers $headers -Method GET
            
            $driveId = $driveItem.parentReference.driveId
            $folderItemId = $driveItem.id
            $folderName = $driveItem.name
            
            Write-Host "✓ 驱动信息获取成功:"
            Write-Host "  - Drive ID: $driveId"
            Write-Host "  - Folder Item ID: $folderItemId"
            Write-Host "  - 文件夹名: $folderName"
            
            "driveId=$driveId" >> $env:GITHUB_OUTPUT
            "folderItemId=$folderItemId" >> $env:GITHUB_OUTPUT
            "folderName=$folderName" >> $env:GITHUB_OUTPUT
            
        } catch {
            Write-Error "获取驱动信息失败: $_"
            throw
        }

    # 步骤二：下载文件（独立获取token）
    - name: Download PVE Files
      shell: pwsh
      run: |
        Write-Host "=== 下载 PVE 文件 ==="
        
        Write-Host "正在获取下载用的访问令牌..."
        $tokenUrl = "https://login.microsoftonline.com/$env:OD_TENANT_ID/oauth2/v2.0/token"
        $body = @{
            client_id     = $env:OD_CLIENT_ID
            scope         = "https://graph.microsoft.com/.default"
            client_secret = $env:OD_CLIENT_SECRET
            grant_type    = "client_credentials"
        }
        
        $tokenResponse = Invoke-RestMethod -Method Post -Uri $tokenUrl -Body $body -ContentType "application/x-www-form-urlencoded"
        $token = ($tokenResponse.access_token).Trim()
        Write-Host "✓ 下载令牌获取成功，长度: $($token.Length) 字符"
       
        $TEMP_DIR = Join-Path $env:TEMP "pve-files"
        New-Item -ItemType Directory -Path $TEMP_DIR -Force | Out-Null
       
        $files = @(
            "${{ github.event.inputs.proxmox_iso_filename }}",
            "${{ github.event.inputs.r8125_driver_filename }}"
        )
       
        $headers = @{ Authorization = "Bearer $token" }
        $successCount = 0
        $driveId = "${{ steps.get_drive_info.outputs.driveId }}"
        $folderName = "${{ steps.get_drive_info.outputs.folderName }}"
       
        foreach ($file in $files) {
            $downloadUrl = "https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${folderName}/${file}:/content"
            $outFile = Join-Path $TEMP_DIR $file
           
            Write-Host "下载: $file"
            try {
                Invoke-RestMethod -Method GET -Uri $downloadUrl -Headers $headers -OutFile $outFile
               
                if (Test-Path $outFile) {
                    $fileSize = (Get-Item $outFile).Length / 1MB
                    $successCount++
                    Write-Host "✓ $file ($([math]::Round($fileSize, 2)) MB)"
                }
            } catch {
                Write-Host "✗ $file - $($_.Exception.Message)"
            }
        }
       
        if ($successCount -ne $files.Count) {
            throw "文件下载不完整: $successCount/$($files.Count) 个文件"
        }
       
        Write-Host "下载完成: $successCount/$($files.Count) 个文件"
        
        # 设置环境变量
        "TEMP_DIR=$TEMP_DIR" >> $env:GITHUB_ENV

    # 步骤三：在 WSL 中构建 ISO
    - name: Build Custom PVE ISO in WSL
      shell: pwsh
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $OutputEncoding = [System.Text.Encoding]::UTF8
        
        Write-Host ""
        Write-Host "================================================"
        Write-Host "PVE ISO + RTL8125 驱动构建"
        Write-Host "================================================"
        Write-Host ""
        
        $isoFile = "${{ github.event.inputs.proxmox_iso_filename }}"
        $driverFile = "${{ github.event.inputs.r8125_driver_filename }}"
        
        Write-Host "ISO 文件: $isoFile"
        Write-Host "驱动文件: $driverFile"
        
        # 在 WSL 中执行构建
        $wslScript = @"
        #!/bin/bash
        set -e
        
        echo "=== 开始构建 PVE ISO ==="
        
        # 设置工作目录
        WORK_DIR="/tmp/pve-build"
        ISO_ORIG="/mnt/c/Users/runneradmin/AppData/Local/Temp/pve-files/$isoFile"
        DRIVER_FILE="/mnt/c/Users/runneradmin/AppData/Local/Temp/pve-files/$driverFile"
        
        # 清理工作目录
        rm -rf \$WORK_DIR
        mkdir -p \$WORK_DIR/iso
        
        echo "1. 解包原始 ISO..."
        xorriso -osirrox on -indev "\$ISO_ORIG" -extract / \$WORK_DIR/iso
        chmod -R +w \$WORK_DIR/iso
        
        echo "2. 添加 RTL8125 驱动..."
        mkdir -p \$WORK_DIR/iso/pool/extras
        cp "\$DRIVER_FILE" \$WORK_DIR/iso/pool/extras/
        
        echo "3. 解析版本信息..."
        ISO_BASENAME=\$(basename "\$ISO_ORIG")
        if [[ "\$ISO_BASENAME" =~ proxmox-ve_([0-9]+\.[0-9]+(-[0-9]+)?)\.iso\$ ]]; then
            PVE_VERSION="\${BASH_REMATCH[1]}"
            ISO_OUTPUT="PVE-\${PVE_VERSION}-r8125.iso"
            ISO_LABEL="PVE-\${PVE_VERSION}-R8125"
            ISO_LABEL=\$(echo "\$ISO_LABEL" | tr -cd '[:alnum:]_-' | cut -c1-32)
            
            echo "PVE 版本: \$PVE_VERSION"
            echo "输出文件: \$ISO_OUTPUT"
            echo "卷标: \$ISO_LABEL"
            
            # 设置环境变量供后续步骤使用
            echo "PVE_VERSION=\$PVE_VERSION" >> \$GITHUB_ENV
            echo "ISO_OUTPUT=\$ISO_OUTPUT" >> \$GITHUB_ENV
        else
            echo "❌ 无法解析 ISO 文件名: \$ISO_BASENAME"
            exit 1
        fi
        
        echo "4. 配置自动安装..."
        PRESEED_FILE="\$WORK_DIR/iso/preseed.cfg"
        if [ ! -f "\$PRESEED_FILE" ]; then
            touch "\$PRESEED_FILE"
        fi
        
        # 添加 late_command
        if ! grep -q "r8125" "\$PRESEED_FILE" 2>/dev/null; then
            cat >> "\$PRESEED_FILE" << 'EOF'
# 自动安装 RTL8125 驱动
d-i preseed/late_command string \
  in-target sh -c "dpkg -i /cdrom/pool/extras/*.deb || true; \
  depmod -a; \
  modprobe r8125 || true"
EOF
            echo "✅ 自动安装配置已添加"
        fi
        
        echo "5. 重新打包 ISO..."
        xorriso -as mkisofs \
          -r -V "\$ISO_LABEL" \
          -o "\$WORK_DIR/\$ISO_OUTPUT" \
          -J -joliet-long \
          \$WORK_DIR/iso
        
        echo "6. 验证生成的 ISO..."
        if [ -f "\$WORK_DIR/\$ISO_OUTPUT" ]; then
            ISO_SIZE=\$(stat -c%s "\$WORK_DIR/\$ISO_OUTPUT")
            echo "✅ ISO 构建完成"
            echo "  文件: \$ISO_OUTPUT"
            echo "  大小: \$((ISO_SIZE/1024/1024)) MB"
            
            # 计算 SHA256
            sha256sum "\$WORK_DIR/\$ISO_OUTPUT" | cut -d' ' -f1 > "\$WORK_DIR/sha256.txt"
            SHA256=\$(cat "\$WORK_DIR/sha256.txt")
            echo "SHA256=\$SHA256" >> \$GITHUB_ENV
            
            # 复制回 Windows
            cp "\$WORK_DIR/\$ISO_OUTPUT" "/mnt/c/Users/runneradmin/AppData/Local/Temp/"
            cp "\$WORK_DIR/sha256.txt" "/mnt/c/Users/runneradmin/AppData/Local/Temp/"
        else
            echo "❌ ISO 打包失败"
            exit 1
        fi
"@
        
        # 保存脚本到临时文件并执行
        $scriptPath = Join-Path $env:TEMP "build-pve.sh"
        $wslScript | Out-File -FilePath $scriptPath -Encoding UTF8
        
        Write-Host "在 WSL 中执行构建脚本..."
        wsl bash $scriptPath
        
        # 获取构建结果
        $isoOutput = "PVE-$env:PVE_VERSION-r8125.iso"
        $isoPath = Join-Path $env:TEMP $isoOutput
        $sha256Path = Join-Path $env:TEMP "sha256.txt"
        
        if (Test-Path $isoPath) {
            $fileSize = (Get-Item $isoPath).Length / 1MB
            Write-Host ""
            Write-Host "=== 构建完成 ==="
            Write-Host "ISO 路径: $isoPath"
            Write-Host "ISO 大小: $([math]::Round($fileSize, 2)) MB"
            Write-Host ""
            
            "ISO_PATH=$isoPath" >> $env:GITHUB_ENV
            "ISO_NAME=$isoOutput" >> $env:GITHUB_ENV
            
            if (Test-Path $sha256Path) {
                $sha256 = Get-Content $sha256Path -Raw
                "SHA256=$sha256" >> $env:GITHUB_ENV
            }
        } else {
            throw "ISO 创建失败"
        }

    # 步骤四：快速上传策略（使用ESXi工作流的代码）
    - name: Upload ISO with Idempotent Strategy (Pure)
      shell: pwsh
      run: |
        [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
        $OutputEncoding = [System.Text.Encoding]::UTF8
        
        Write-Host "========================================"
        Write-Host "快速上传策略：检测→删除→上传（纯净版）"
        Write-Host "========================================"
        Write-Host ""
        
        # 1. 获取全新的上传token（每次必须新token）
        Write-Host "[1/7] 获取全新的上传token..."
        $tokenUrl = "https://login.microsoftonline.com/$env:OD_TENANT_ID/oauth2/v2.0/token"
        $body = @{
            client_id     = $env:OD_CLIENT_ID
            scope         = "https://graph.microsoft.com/.default"
            client_secret = $env:OD_CLIENT_SECRET
            grant_type    = "client_credentials"
        }
        
        try {
            $uploadTokenResponse = Invoke-RestMethod -Method Post -Uri $tokenUrl -Body $body -ContentType "application/x-www-form-urlencoded"
            $uploadToken = ($uploadTokenResponse.access_token).Trim()
            
            if ([string]::IsNullOrEmpty($uploadToken)) {
                throw "上传用token为空"
            }
            
            Write-Host "✓ 全新上传token获取成功"
        } catch {
            Write-Error "获取上传token失败: $_"
            throw
        }
        
        # 2. 验证ISO文件
        Write-Host ""
        Write-Host "[2/7] 验证ISO文件..."
        $isoPath = $env:ISO_PATH
        if ([string]::IsNullOrEmpty($isoPath)) {
            $isoPath = Join-Path $env:TEMP "PVE-$env:PVE_VERSION-r8125.iso"
        }
        if (-not (Test-Path $isoPath)) { 
            throw "ISO 文件不存在: $isoPath" 
        }
        
        $isoName = $env:ISO_NAME
        if ([string]::IsNullOrEmpty($isoName)) {
            $isoName = "PVE-$env:PVE_VERSION-r8125.iso"
        }
        
        $fileInfo = Get-Item $isoPath
        $fileSize = $fileInfo.Length
        Write-Host "✓ ISO文件验证成功:"
        Write-Host "  - 文件名: $isoName"
        Write-Host "  - 文件大小: $([math]::Round($fileSize / 1MB, 2)) MB"
        
        # 3. 获取文件夹信息和drive信息
        Write-Host ""
        Write-Host "[3/7] 获取文件夹信息和drive信息..."
        
        # 获取全新的读取token（与上传token分开）
        Write-Host "获取全新的读取token用于解析共享链接..."
        $readTokenResponse = Invoke-RestMethod -Method Post -Uri $tokenUrl -Body $body -ContentType "application/x-www-form-urlencoded"
        $readToken = ($readTokenResponse.access_token).Trim()
        Write-Host "✓ 读取token获取成功"
        
        # 解析共享链接获取详细信息
        $encodedLink = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($env:SHARED_LINK)).TrimEnd("=")
        $shareUrl = "https://graph.microsoft.com/v1.0/shares/u!$encodedLink/driveItem"
        
        try {
            $headers = @{ Authorization = "Bearer $readToken" }
            $driveItem = Invoke-RestMethod -Uri $shareUrl -Headers $headers -Method GET
            
            $driveId = $driveItem.parentReference.driveId
            $folderName = $driveItem.name
            
            # 清理文件夹名中的URL编码
            $folderName = [System.Uri]::UnescapeDataString($folderName)
            
            Write-Host "✓ 文件夹信息获取成功:"
            Write-Host "  - Drive ID: $driveId"
            Write-Host "  - 文件夹名: $folderName"
            
            # 确保文件夹名是正确的
            if ([string]::IsNullOrEmpty($folderName)) {
                $folderName = "PVE-Custom-ISO"
                Write-Host "⚠️ 使用默认文件夹名: $folderName"
            }
            
        } catch {
            Write-Host "⚠️ 获取文件夹信息失败，使用默认值"
            $driveId = "${{ steps.get_drive_info.outputs.driveId }}"
            $folderName = "PVE-Custom-ISO"
        }
        
        # 4. 构建文件路径
        Write-Host ""
        Write-Host "[4/7] 构建文件路径..."
        
        $encodedFolderName = [System.Uri]::EscapeDataString($folderName)
        $encodedIsoName = [System.Uri]::EscapeDataString($isoName)
        $fileUrl = "https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodedFolderName}/${encodedIsoName}"
        
        Write-Host "文件完整URL:"
        Write-Host "  $fileUrl"
        Write-Host ""
        
        # 5. 幂等操作核心：无条件删除现有文件
        Write-Host "[5/7] 执行幂等操作：无条件删除现有文件..."
        
        $uploadHeaders = @{ Authorization = "Bearer $uploadToken" }
        
        Write-Host "检查文件是否存在并尝试删除..."
        
        try {
            # 尝试删除文件（幂等操作：删除不存在文件也返回成功）
            Invoke-RestMethod -Uri $fileUrl -Headers $uploadHeaders -Method DELETE
            Write-Host "✅ 文件删除成功（或原本不存在）"
            
            # 等待删除操作完成并验证
            Write-Host "等待 2 秒确保删除操作完成..."
            Start-Sleep -Seconds 2
            
            # 可选：验证文件确实被删除（增加稳定性）
            Write-Host "验证文件是否确实不存在..."
            try {
                $checkResponse = Invoke-RestMethod -Uri $fileUrl -Headers $uploadHeaders -Method GET
                Write-Host "⚠️ 文件仍然存在，尝试再次删除..."
                Invoke-RestMethod -Uri $fileUrl -Headers $uploadHeaders -Method DELETE
                Start-Sleep -Seconds 1
            } catch {
                if ($_.Exception.Response.StatusCode -eq 404) {
                    Write-Host "✅ 确认文件已不存在"
                }
            }
            
        } catch {
            # 即使删除失败也继续尝试上传（降级处理）
            Write-Host "⚠️ 删除操作异常: $($_.Exception.Message)"
            Write-Host "  将继续尝试上传..."
        }
        
        # 6. 创建上传会话（使用最简请求体，完全避免replace语义）
        Write-Host ""
        Write-Host "[6/7] 创建上传会话（纯净请求体）..."
        
        # 构建稳定的上传URL（使用root路径格式）
        $createUrl = "https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodedFolderName}/${encodedIsoName}:/createUploadSession"
        
        Write-Host "使用稳定上传URL:"
        Write-Host "  $createUrl"
        Write-Host ""
        
        $sessionHeaders = @{
            Authorization = "Bearer $uploadToken"
            "Content-Type" = "application/json"
        }
        
        # 最纯净的请求体：空对象，完全避免replace语义
        # 根据Microsoft Graph API文档，createUploadSession支持空请求体
        # 默认冲突行为是"fail"，但由于文件已删除，实际上就是创建新文件
        $bodyJson = @{} | ConvertTo-Json -Compress
        
        Write-Host "请求体（纯净空对象）: $bodyJson"
        Write-Host ""
        
        try {
            Write-Host "正在发送创建上传会话请求..."
            $session = Invoke-RestMethod -Method POST -Uri $createUrl -Headers $sessionHeaders -Body $bodyJson
            
            if (-not $session.uploadUrl) {
                throw "响应中未找到 uploadUrl"
            }
            
            $uploadSessionUrl = $session.uploadUrl
            Write-Host ""
            Write-Host "✅ 上传会话创建成功！"
            Write-Host "  - 使用稳定路径: /root:/${encodedFolderName}/${encodedIsoName}:"
            Write-Host "  - 使用纯净请求体: {}"
            
            # 7. 执行分片上传
            Write-Host ""
            Write-Host "[7/7] 执行分片上传..."
            
            $chunkSize = 3276800 * 10  # 约31.25MB
            $fileStream = [System.IO.File]::OpenRead($isoPath)
            $totalChunks = [math]::Ceiling($fileSize / $chunkSize)
            $bytesUploaded = 0
            
            Write-Host "  - 分片大小: $([math]::Round($chunkSize / 1MB, 2)) MB"
            Write-Host "  - 总块数: $totalChunks"
            Write-Host ""
            
            for ($i = 0; $i -lt $totalChunks; $i++) {
                $buffer = New-Object byte[] $chunkSize
                $bytesRead = $fileStream.Read($buffer, 0, $chunkSize)
                
                if ($bytesRead -eq 0) { break }
                
                $rangeStart = $bytesUploaded
                $rangeEnd = $bytesUploaded + $bytesRead - 1
                $rangeHeader = "bytes $rangeStart-$rangeEnd/$fileSize"
                
                $retry = 0
                $maxRetries = 3
                $success = $false
                
                while (-not $success -and $retry -lt $maxRetries) {
                    try {
                        $request = [System.Net.HttpWebRequest]::Create($uploadSessionUrl)
                        $request.Method = "PUT"
                        $request.ContentType = "application/octet-stream"
                        $request.ContentLength = $bytesRead
                        $request.Headers.Add("Content-Range", $rangeHeader)
                        
                        $requestStream = $request.GetRequestStream()
                        $requestStream.Write($buffer, 0, $bytesRead)
                        $requestStream.Close()
                        
                        # 获取响应，忽略可能的读取错误
                        try {
                            $response = $request.GetResponse()
                            $responseStream = $response.GetResponseStream()
                            $reader = New-Object System.IO.StreamReader($responseStream)
                            $responseContent = $reader.ReadToEnd()
                            $reader.Close()
                            $responseStream.Close()
                            $response.Close()
                        } catch {
                            # 忽略响应读取错误，只要请求成功发送
                        }
                        
                        $progress = [math]::Round(($rangeEnd + 1) / $fileSize * 100, 2)
                        Write-Host "分片 [$($i+1)/$totalChunks]: ✓ 成功 (进度: ${progress}%)"
                        $success = $true
                        
                    } catch {
                        $retry++
                        if ($retry -eq $maxRetries) {
                            Write-Host "分片 [$($i+1)/$totalChunks]: ✗ 失败 - $rangeHeader"
                            Write-Host "  错误: $($_.Exception.Message)"
                            throw "分片上传失败"
                        }
                        Write-Host "分片 [$($i+1)/$totalChunks]: ⚠️ 重试 $retry/$maxRetries (等待 2 秒...)"
                        Start-Sleep -Seconds 2
                    }
                }
                
                $bytesUploaded += $bytesRead
                
                # 每上传几个分片后短暂暂停
                if (($i + 1) % 5 -eq 0) {
                    Start-Sleep -Milliseconds 300
                }
            }
            
            $fileStream.Close()
            Write-Host ""
            Write-Host "========================================"
            Write-Host "✅ 快速上传完成！"
            Write-Host "  - 文件: $isoName"
            Write-Host "  - 大小: $([math]::Round($fileSize / 1MB, 2)) MB"
            Write-Host "  - 总块数: $totalChunks"
            Write-Host "  - 策略: 检测→删除→验证→上传"
            Write-Host "  - 请求体: 纯净空对象 {}"
            Write-Host "========================================"
            
        } catch {
            Write-Host ""
            Write-Host "❌ 上传失败: $($_.Exception.Message)"
            
            # 输出详细错误信息
            if ($_.Exception.Response) {
                try {
                    $errorStream = $_.Exception.Response.GetResponseStream()
                    $reader = New-Object System.IO.StreamReader($errorStream)
                    $errorBody = $reader.ReadToEnd()
                    $reader.Close()
                    $errorStream.Close()
                    
                    Write-Host ""
                    Write-Host "🔴 Graph API 错误响应:"
                    Write-Host $errorBody
                    
                    # 尝试解析错误详情
                    try {
                        $errorObj = $errorBody | ConvertFrom-Json
                        if ($errorObj.error) {
                            Write-Host ""
                            Write-Host "错误详情:"
                            Write-Host "  代码: $($errorObj.error.code)"
                            Write-Host "  消息: $($errorObj.error.message)"
                        }
                    } catch {
                        # 忽略JSON解析错误
                    }
                } catch {
                    Write-Host "无法读取错误响应流"
                }
            }
            
            throw
        }

    - name: Check ISO file exists before artifact upload
      shell: pwsh
      id: check-artifact
      run: |
        Write-Host "=== 检查ISO文件是否存在 ==="
        
        $possiblePaths = @(
            "$env:ISO_PATH",
            "$env:TEMP\PVE-$env:PVE_VERSION-r8125.iso",
            "$env:RUNNER_TEMP\PVE-$env:PVE_VERSION-r8125.iso"
        )
        
        $foundPath = $null
        foreach ($path in $possiblePaths) {
            if ($path -and (Test-Path $path)) {
                $foundPath = $path
                $fileSize = (Get-Item $path).Length / 1MB
                Write-Host "✅ 找到ISO文件: $path ($([math]::Round($fileSize, 2)) MB)"
                break
            }
        }
        
        if ($foundPath) {
            "artifact_path=$foundPath" >> $env:GITHUB_OUTPUT
        } else {
            Write-Host "⚠️ ISO文件不存在，将跳过Artifact上传"
        }

    - name: Upload to GitHub Artifacts (Conditional)
      if: steps.check-artifact.outputs.artifact_path != ''
      uses: actions/upload-artifact@v4
      with:
        name: PVE-${{ env.PVE_VERSION }}-R8125-ISO
        path: ${{ steps.check-artifact.outputs.artifact_path }}
        retention-days: 7
        if-no-files-found: ignore

    - name: Display Artifact Download Link
      if: steps.upload-artifact.outputs.artifact-id != ''
      shell: pwsh
      run: |
        Write-Host ""
        Write-Host "========================================"
        Write-Host "✅ GitHub Artifact 上传完成！"
        Write-Host "📦 Artifact 名称: PVE-$env:PVE_VERSION-R8125-ISO"
        Write-Host "🔗 下载链接可在 GitHub Actions 页面查看"
        Write-Host "========================================"

    # 步骤五：创建 GitHub Release
    - name: Create GitHub Release
      shell: pwsh
      run: |
        Write-Host "=== 创建 GitHub Release ==="
        
        # 检查是否需要重建
        $forceRebuild = "${{ github.event.inputs.force_rebuild }}"
        
        if ($forceRebuild -eq "false") {
            Write-Host "检查现有 Release..."
            $tagName = "pve-$env:PVE_VERSION-r8125"
            
            $releaseUrl = "https://api.github.com/repos/${{ github.repository }}/releases/tags/$tagName"
            $headers = @{
                "Authorization" = "token ${{ github.token }}"
                "Accept" = "application/vnd.github.v3+json"
            }
            
            try {
                $releaseInfo = Invoke-RestMethod -Uri $releaseUrl -Headers $headers -Method GET
                Write-Host "✅ Release 已存在: $tagName"
                Write-Host "跳过创建 Release"
                return
            } catch {
                Write-Host "Release 不存在，继续创建..."
            }
        } else {
            Write-Host "强制重建模式，创建新 Release..."
        }
        
        # 创建 Release
        $releaseBody = @"
- **PVE 版本**: $env:PVE_VERSION
- **RTL8125 驱动版本**: ${{ github.event.inputs.r8125_driver_filename }}
- **SHA256**: $env:SHA256
"@
        
        $createReleaseUrl = "https://api.github.com/repos/${{ github.repository }}/releases"
        $releaseData = @{
            tag_name = "pve-$env:PVE_VERSION-r8125"
            name = "PVE $env:PVE_VERSION with RTL8125"
            body = $releaseBody
            draft = $false
            prerelease = $false
        } | ConvertTo-Json
        
        Write-Host "创建 Release..."
        try {
            $releaseResponse = Invoke-RestMethod -Uri $createReleaseUrl -Headers $headers -Method POST -Body $releaseData
            Write-Host "✅ Release 创建成功: $($releaseResponse.html_url)"
        } catch {
            Write-Error "创建 Release 失败: $_"
        }
