name: Build PVE ISO with RTL8125 (Cloud Only)

on:
  workflow_dispatch:
    inputs:
      proxmox_iso_filename:
        description: 'Proxmox ISO 文件名（在 OneDrive 中）'
        required: true
        default: 'proxmox-ve_9.1-1.iso'
      r8125_driver_filename:
        description: 'RTL8125 驱动文件名（在 OneDrive 中）'
        required: true
        default: 'realtek-r8125-dkms_9.016.01-1_amd64.deb'
      pve_custom_iso_link:
        description: 'OneDrive PVE-Custom-ISO 共享链接'
        required: true
        default: 'https://xs9888outlook-my.sharepoint.com/my?id=%2Fpersonal%2Fx%5Fxs9888outlook%5Fonmicrosoft%5Fcom%2FDocuments%2FPVE%2DCustom%2DISO&viewid=5f3047b5-37d1-41fc-8f65-d63151c422ca'

permissions:
  contents: write

env:
  OD_CLIENT_ID: ${{ secrets.OD_CLIENT_ID }}
  OD_CLIENT_SECRET: ${{ secrets.OD_CLIENT_SECRET }}
  OD_TENANT_ID: ${{ secrets.OD_TENANT_ID }}
  SHARED_LINK: ${{ github.event.inputs.pve_custom_iso_link }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # =========================
      # 准备阶段
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          echo "=== 安装依赖包 ==="
          sudo apt-get update
          # 关键修复：安装 isolinux 以获取 MBR 引导模板 (isohdpfx.bin)，否则 USB 无法启动
          sudo apt-get install -y xorriso curl file jq isolinux
          echo "✅ 依赖安装完成"
          echo "  - xorriso: ISO 打包工具"
          echo "  - isolinux: 提供 MBR 模板文件 (isohdpfx.bin)"
          echo "  - curl/file/jq: 网络和文件处理工具"

      # =========================
      # 获取 OneDrive 驱动和文件夹信息
      # =========================
      - name: Get OneDrive Drive and Folder Information
        id: get_drive_info
        shell: pwsh
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          
          Write-Host "=== 获取驱动和文件夹信息 ==="
          
          $tokenUrl = "https://login.microsoftonline.com/$env:OD_TENANT_ID/oauth2/v2.0/token"
          $body = @{
              client_id     = $env:OD_CLIENT_ID
              scope         = "https://graph.microsoft.com/.default"
              client_secret = $env:OD_CLIENT_SECRET
              grant_type    = "client_credentials"
          }
          
          Write-Host "正在获取访问令牌..."
          try {
              $tokenResponse = Invoke-RestMethod -Method Post -Uri $tokenUrl -Body $body -ContentType "application/x-www-form-urlencoded"
              $token = ($tokenResponse.access_token).Trim()
              
              if ([string]::IsNullOrEmpty($token)) {
                  throw "获取到的访问令牌为空"
              }
              Write-Host "✓ 访问令牌获取成功"
          } catch {
              Write-Error "获取访问令牌失败: $_"
              throw
          }
          
          Write-Host "正在解析共享链接..."
          $encodedLink = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($env:SHARED_LINK)).TrimEnd("=")
          $shareUrl = "https://graph.microsoft.com/v1.0/shares/u!$encodedLink/driveItem"
          
          try {
              $headers = @{ Authorization = "Bearer $token" }
              $driveItem = Invoke-RestMethod -Uri $shareUrl -Headers $headers -Method GET
              
              $driveId = $driveItem.parentReference.driveId
              $folderItemId = $driveItem.id
              $folderName = $driveItem.name
              
              Write-Host "✓ 驱动信息获取成功:"
              Write-Host "  - Drive ID: $driveId"
              Write-Host "  - Folder Item ID: $folderItemId"
              Write-Host "  - 文件夹名: $folderName"
              
              "driveId=$driveId" >> $env:GITHUB_OUTPUT
              "folderItemId=$folderItemId" >> $env:GITHUB_OUTPUT
              "folderName=$folderName" >> $env:GITHUB_OUTPUT
              
          } catch {
              Write-Error "获取驱动信息失败: $_"
              throw
          }

      # =========================
      # 下载文件（使用PowerShell，参考ESXi工作流）
      # =========================
      - name: Download Files from OneDrive
        shell: pwsh
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          
          Write-Host "=== 下载文件 ==="
          
          Write-Host "正在获取下载用的访问令牌..."
          $tokenUrl = "https://login.microsoftonline.com/$env:OD_TENANT_ID/oauth2/v2.0/token"
          $body = @{
              client_id     = $env:OD_CLIENT_ID
              scope         = "https://graph.microsoft.com/.default"
              client_secret = $env:OD_CLIENT_SECRET
              grant_type    = "client_credentials"
          }
          
          $tokenResponse = Invoke-RestMethod -Method Post -Uri $tokenUrl -Body $body -ContentType "application/x-www-form-urlencoded"
          $token = ($tokenResponse.access_token).Trim()
          Write-Host "✓ 下载令牌获取成功"
          
          $downloadDir = "downloads"
          New-Item -ItemType Directory -Path $downloadDir -Force | Out-Null
          
          $proxmoxIso = "${{ github.event.inputs.proxmox_iso_filename }}"
          $driverFile = "${{ github.event.inputs.r8125_driver_filename }}"
          
          $files = @($proxmoxIso, $driverFile)
          
          $headers = @{ Authorization = "Bearer $token" }
          $successCount = 0
          $driveId = "${{ steps.get_drive_info.outputs.driveId }}"
          $folderName = "${{ steps.get_drive_info.outputs.folderName }}"
          
          foreach ($file in $files) {
              $downloadUrl = "https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${folderName}/${file}:/content"
              $outFile = Join-Path $downloadDir $file
              
              Write-Host "下载: $file"
              try {
                  Invoke-RestMethod -Method GET -Uri $downloadUrl -Headers $headers -OutFile $outFile
                  
                  if (Test-Path $outFile) {
                      $fileSize = (Get-Item $outFile).Length
                      $successCount++
                      
                      if ($file.EndsWith(".iso")) {
                          $sizeMB = $fileSize / 1MB
                          Write-Host "✓ $file ($([math]::Round($sizeMB, 2)) MB)"
                      } else {
                          $sizeKB = $fileSize / 1KB
                          Write-Host "✓ $file ($([math]::Round($sizeKB, 2)) KB)"
                      }
                  }
              } catch {
                  Write-Host "✗ $file - $($_.Exception.Message)"
              }
          }
          
          if ($successCount -ne $files.Count) {
              throw "下载完成: $successCount/$($files.Count) 个文件"
          }
          
          Write-Host "✓ 所有文件下载成功"
          
          # 设置环境变量
          "ISO_ORIG=downloads/$proxmoxIso" >> $env:GITHUB_ENV
          "DRIVER_FILE=downloads/$driverFile" >> $env:GITHUB_ENV

      # =========================
      # 验证 ISO 文件
      # =========================
      - name: Verify ISO File
        run: |
          echo "=== 验证 ISO 文件 ==="
          
          if ! xorriso -indev "$ISO_ORIG" -toc 2>&1 | grep -q "Media summary"; then
            echo "❌ ISO 文件格式不正确或已损坏"
            exit 1
          fi
          
          echo "✅ ISO 文件验证通过"

      # =========================
      # 解析版本信息
      # =========================
      - name: Parse Version Information
        run: |
          echo "=== 解析版本信息 ==="
          
          # 从 ISO 文件名提取 PVE 版本
          ISO_BASENAME=$(basename "$ISO_ORIG")
          if [[ "$ISO_BASENAME" =~ proxmox-ve_([0-9]+\.[0-9]+(-[0-9]+)?)\.iso$ ]]; then
            PVE_VERSION="${BASH_REMATCH[1]}"
            echo "PVE_VERSION=$PVE_VERSION" >> $GITHUB_ENV
            echo "ISO_OUTPUT=PVE-${PVE_VERSION}-r8125.iso" >> $GITHUB_ENV
            
            # 关键修复：使用 blkid 提取官方原版卷标，防止安装报错
            echo "正在提取原版 ISO 卷标..."
            ORIG_LABEL=$(blkid -o value -s LABEL "$ISO_ORIG")
            if [ -z "$ORIG_LABEL" ]; then
                # 如果 blkid 无法提取，使用合理的默认值
                ORIG_LABEL="PVE-${PVE_VERSION}"
                echo "⚠️  blkid 无法提取卷标，使用默认值: $ORIG_LABEL"
            else
                echo "✅ 成功提取原版卷标: $ORIG_LABEL"
            fi
            
            # 确保卷标长度和字符集合规
            ISO_LABEL=$(echo "$ORIG_LABEL" | tr -cd '[:alnum:]_-' | cut -c1-32)
            echo "ISO_LABEL=$ISO_LABEL" >> $GITHUB_ENV
            
            echo "✅ PVE 版本: $PVE_VERSION"
            echo "✅ 输出文件: $ISO_OUTPUT"
            echo "✅ 卷标: $ISO_LABEL"
          else
            echo "❌ 无法解析 ISO 文件名: $ISO_BASENAME"
            echo "⚠️  期望格式: proxmox-ve_X.Y-Z.iso"
            exit 1
          fi
          
          # 从驱动文件名提取驱动版本
          DRIVER_BASENAME=$(basename "$DRIVER_FILE")
          if [[ "$DRIVER_BASENAME" =~ realtek-r8125-dkms_([^_]+)_amd64\.deb ]]; then
            DRIVER_VERSION="${BASH_REMATCH[1]}"
            echo "DRIVER_VERSION=$DRIVER_VERSION" >> $GITHUB_ENV
            echo "✅ 驱动版本: $DRIVER_VERSION"
          else
            echo "❌ 无法解析驱动文件名: $DRIVER_BASENAME"
            exit 1
          fi

      # =========================
      # 检查并删除现有的GitHub Release
      # =========================
      - name: Check and Delete Existing GitHub Release
        shell: pwsh
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          
          Write-Host "=== 检查并删除现有的 GitHub Release ==="
          
          $releaseTag = "pve-${{ env.PVE_VERSION }}-r8125"
          $releaseUrl = "https://api.github.com/repos/${{ github.repository }}/releases/tags/${releaseTag}"
          $authHeader = @{ Authorization = "token ${{ github.token }}" }
          
          Write-Host "检查 Release: $releaseTag"
          
          try {
              $releaseInfo = Invoke-RestMethod -Uri $releaseUrl -Headers $authHeader -ErrorAction Stop
              Write-Host "✅ 找到现有的 Release: $($releaseInfo.name)"
              
              # 删除现有的 Release
              $deleteUrl = "https://api.github.com/repos/${{ github.repository }}/releases/$($releaseInfo.id)"
              Invoke-RestMethod -Uri $deleteUrl -Headers $authHeader -Method DELETE
              Write-Host "✅ 已删除现有的 Release"
              
              # 删除现有的 Git Tag
              $tagUrl = "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/${releaseTag}"
              try {
                  Invoke-RestMethod -Uri $tagUrl -Headers $authHeader -Method DELETE
                  Write-Host "✅ 已删除现有的 Git Tag"
              } catch {
                  Write-Host "⚠️ 删除 Git Tag 失败: $($_.Exception.Message)"
              }
              
          } catch {
              if ($_.Exception.Response.StatusCode -eq 404) {
                  Write-Host "✅ Release 不存在，无需删除"
              } else {
                  Write-Host "⚠️ 检查 Release 失败: $($_.Exception.Message)"
              }
          }

      # =========================
      # 构建自定义 ISO (最终完美修复版 - 支持USB混合引导)
      # =========================
      - name: Build Custom ISO
        run: |
          echo "=== 构建自定义 ISO (支持USB混合引导) ==="
          
          # 清理工作目录
          rm -rf work
          mkdir -p work/iso
          
          echo "1. 解包原始 ISO..."
          xorriso -osirrox on -indev "$ISO_ORIG" -extract / work/iso
          chmod -R +w work/iso
          
          echo "2. 添加 RTL8125 驱动..."
          mkdir -p work/iso/pool/extras
          cp "$DRIVER_FILE" work/iso/pool/extras/
          
          echo "3. 配置 Preseed（兼容新旧安装器）"
          PRESEED_FILE="work/iso/preseed.cfg"
          # 使用 cat 覆盖写入，并加入硬件识别逻辑
          cat > "$PRESEED_FILE" << 'EOF'
          # 兼容 d-i (旧版) 和 pve-installer (新版)
          d-i preseed/late_command string \
            in-target sh -c "if lspci -n | grep -q '10ec:8125'; then \
              echo 'Detected RTL8125, installing driver...'; \
              dpkg -i /cdrom/pool/extras/*.deb; \
              echo 'blacklist r8169' >> /etc/modprobe.d/blacklist-pve.conf; \
              depmod -a; \
              modprobe r8125; \
            else echo 'RTL8125 not detected, skipping.'; fi"
          EOF
          echo "✅ 自动安装配置已添加（含硬件检测逻辑）"
          
          echo "4. 智能识别引导架构 (动态查找文件)..."
          
          # 动态查找引导文件，不依赖硬编码路径
          FULL_ISOLINUX=$(find work/iso -name isolinux.bin 2>/dev/null | head -1)
          FULL_GRUB_BIOS=$(find work/iso -name eltorito.img 2>/dev/null | head -1)
          FULL_EFI=$(find work/iso -name efi.img 2>/dev/null | head -1)
          
          echo "  找到的文件:"
          echo "    - ISOLINUX: $FULL_ISOLINUX"
          echo "    - GRUB BIOS: $FULL_GRUB_BIOS"
          echo "    - EFI: $FULL_EFI"
          
          # 基础打包命令
          XORRISO_CMD="xorriso -as mkisofs -r -V \"$ISO_LABEL\" -o \"$ISO_OUTPUT\" -J -joliet-long"
          
          # --- Legacy BIOS 处理 ---
          if [ -n "$FULL_ISOLINUX" ]; then
            echo "✅ 检测到 Legacy ISOLINUX (旧版架构)"
            REL_ISOLINUX=${FULL_ISOLINUX#work/iso/}
            REL_CAT=$(dirname "$REL_ISOLINUX")/boot.cat
            
            # 关键修复：查找系统 MBR 模板文件 (isohdpfx.bin) 用于 USB 混合引导
            HOST_MBR=$(find /usr -name isohdpfx.bin 2>/dev/null | head -1)
            if [ -z "$HOST_MBR" ]; then
                HOST_MBR=$(find /usr/lib/ISOLINUX -name isohdpfx.bin 2>/dev/null | head -1)
            fi
            
            if [ -n "$HOST_MBR" ]; then
                echo "✅ 找到 MBR 模板文件: $HOST_MBR"
                # 关键修复：添加 -isohybrid-mbr 以支持 USB 启动
                XORRISO_CMD="$XORRISO_CMD -isohybrid-mbr $HOST_MBR -b $REL_ISOLINUX -c $REL_CAT -boot-load-size 4 -boot-info-table -no-emul-boot"
            else
                echo "⚠️ 警告：未找到 MBR 模板文件 (isohdpfx.bin)，USB 引导可能受限"
                XORRISO_CMD="$XORRISO_CMD -b $REL_ISOLINUX -c $REL_CAT -boot-load-size 4 -boot-info-table -no-emul-boot"
            fi
          
          elif [ -n "$FULL_GRUB_BIOS" ]; then
            echo "✅ 检测到 Pure GRUB (新版架构 PVE 9+)"
            REL_GRUB=${FULL_GRUB_BIOS#work/iso/}
            XORRISO_CMD="$XORRISO_CMD -b $REL_GRUB -no-emul-boot -boot-load-size 4 -boot-info-table --grub2-boot-info"
          
          else
            echo "❌ 致命错误：找不到 BIOS 引导文件"
            echo "  请检查原始 ISO 是否包含引导文件"
            exit 1
          fi

          # --- UEFI 处理 ---
          if [ -n "$FULL_EFI" ]; then
            REL_EFI=${FULL_EFI#work/iso/}
            XORRISO_CMD="$XORRISO_CMD -eltorito-alt-boot -e $REL_EFI -no-emul-boot -isohybrid-gpt-basdat"
            echo "✅ 添加 UEFI 引导支持: $REL_EFI"
          else
            echo "⚠️ 警告：找不到 EFI 引导文件，ISO 可能无法在 UEFI 模式下启动"
          fi
          
          # 完成命令构建
          XORRISO_CMD="$XORRISO_CMD work/iso"
          
          echo "5. 执行打包命令..."
          echo "打包命令: $XORRISO_CMD"
          
          eval "$XORRISO_CMD"
          
          # 验证生成的 ISO
          if [ ! -f "$ISO_OUTPUT" ]; then
            echo "❌ ISO 打包失败"
            exit 1
          fi
          
          ISO_SIZE=$(stat -c%s "$ISO_OUTPUT")
          echo "✅ ISO 构建完成"
          echo "  文件: $ISO_OUTPUT"
          echo "  大小: $((ISO_SIZE/1024/1024)) MB"
          
          # 计算 SHA256
          sha256sum "$ISO_OUTPUT" > sha256.txt
          SHA256=$(cut -d' ' -f1 sha256.txt)
          echo "SHA256=$SHA256" >> $GITHUB_ENV
          echo "ISO_SIZE=$ISO_SIZE" >> $GITHUB_ENV
          
          # 验证 ISO 引导信息
          echo "6. 验证 ISO 引导信息..."
          if xorriso -indev "$ISO_OUTPUT" -toc 2>&1 | grep -q "Media summary"; then
            echo "✅ ISO 引导信息验证通过"
          else
            echo "⚠️  ISO 引导信息验证异常"
          fi

      # =========================
      # 幂等上传到 OneDrive（完全保留原代码的生产级特性）
      # =========================
      - name: Upload ISO with Idempotent Strategy
        shell: pwsh
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          
          Write-Host "========================================"
          Write-Host "幂等上传策略：检测→删除→上传（纯净版）"
          Write-Host "========================================"
          Write-Host ""
          
          # 1. 获取全新的上传token
          Write-Host "[1/7] 获取全新的上传token..."
          $tokenUrl = "https://login.microsoftonline.com/$env:OD_TENANT_ID/oauth2/v2.0/token"
          $body = @{
              client_id     = $env:OD_CLIENT_ID
              scope         = "https://graph.microsoft.com/.default"
              client_secret = $env:OD_CLIENT_SECRET
              grant_type    = "client_credentials"
          }
          
          try {
              $uploadTokenResponse = Invoke-RestMethod -Method Post -Uri $tokenUrl -Body $body -ContentType "application/x-www-form-urlencoded"
              $uploadToken = ($uploadTokenResponse.access_token).Trim()
              
              if ([string]::IsNullOrEmpty($uploadToken)) {
                  throw "上传用token为空"
              }
              
              Write-Host "✓ 全新上传token获取成功"
          } catch {
              Write-Error "获取上传token失败: $_"
              throw
          }
          
          # 2. 验证ISO文件
          Write-Host ""
          Write-Host "[2/7] 验证ISO文件..."
          $isoPath = "${{ env.ISO_OUTPUT }}"
          if (-not (Test-Path $isoPath)) { 
              throw "ISO 文件不存在: $isoPath" 
          }
          
          $isoName = "${{ env.ISO_OUTPUT }}"
          $fileInfo = Get-Item $isoPath
          $fileSize = $fileInfo.Length
          Write-Host "✓ ISO文件验证成功:"
          Write-Host "  - 文件名: $isoName"
          Write-Host "  - 文件大小: $([math]::Round($fileSize / 1MB, 2)) MB"
          
          # 3. 获取文件夹信息和drive信息
          Write-Host ""
          Write-Host "[3/7] 获取文件夹信息和drive信息..."
          
          # 获取全新的读取token（与上传token分开）
          Write-Host "获取全新的读取token用于解析共享链接..."
          $readTokenResponse = Invoke-RestMethod -Method Post -Uri $tokenUrl -Body $body -ContentType "application/x-www-form-urlencoded"
          $readToken = ($readTokenResponse.access_token).Trim()
          Write-Host "✓ 读取token获取成功"
          
          # 解析共享链接获取详细信息
          $encodedLink = [Convert]::ToBase64String([Text.Encoding]::UTF8.GetBytes($env:SHARED_LINK)).TrimEnd("=")
          $shareUrl = "https://graph.microsoft.com/v1.0/shares/u!$encodedLink/driveItem"
          
          try {
              $headers = @{ Authorization = "Bearer $readToken" }
              $driveItem = Invoke-RestMethod -Uri $shareUrl -Headers $headers -Method GET
              
              $driveId = $driveItem.parentReference.driveId
              $folderName = $driveItem.name
              
              # 清理文件夹名中的URL编码
              $folderName = [System.Uri]::UnescapeDataString($folderName)
              
              Write-Host "✓ 文件夹信息获取成功:"
              Write-Host "  - Drive ID: $driveId"
              Write-Host "  - 文件夹名: $folderName"
              
              # 确保文件夹名是正确的
              if ([string]::IsNullOrEmpty($folderName)) {
                  $folderName = "PVE-Custom-ISO"
                  Write-Host "⚠️ 使用默认文件夹名: $folderName"
              }
              
          } catch {
              Write-Host "⚠️ 获取文件夹信息失败，使用默认值"
              $driveId = "${{ steps.get_drive_info.outputs.driveId }}"
              $folderName = "PVE-Custom-ISO"
          }
          
          # 4. 构建文件路径
          Write-Host ""
          Write-Host "[4/7] 构建文件路径..."
          
          $encodedFolderName = [System.Uri]::EscapeDataString($folderName)
          $encodedIsoName = [System.Uri]::EscapeDataString($isoName)
          $fileUrl = "https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodedFolderName}/${encodedIsoName}"
          
          Write-Host "文件完整URL:"
          Write-Host "  $fileUrl"
          Write-Host ""
          
          # 5. 幂等操作核心：无条件删除现有文件
          Write-Host "[5/7] 执行幂等操作：无条件删除现有文件..."
          
          $uploadHeaders = @{ Authorization = "Bearer $uploadToken" }
          
          Write-Host "检查文件是否存在并尝试删除..."
          
          try {
              # 尝试删除文件（幂等操作：删除不存在文件也返回成功）
              Invoke-RestMethod -Uri $fileUrl -Headers $uploadHeaders -Method DELETE
              Write-Host "✅ 文件删除成功（或原本不存在）"
              
              # 等待删除操作完成并验证
              Write-Host "等待 2 秒确保删除操作完成..."
              Start-Sleep -Seconds 2
              
              # 可选：验证文件确实被删除（增加稳定性）
              Write-Host "验证文件是否确实不存在..."
              try {
                  $checkResponse = Invoke-RestMethod -Uri $fileUrl -Headers $uploadHeaders -Method GET
                  Write-Host "⚠️ 文件仍然存在，尝试再次删除..."
                  Invoke-RestMethod -Uri $fileUrl -Headers $uploadHeaders -Method DELETE
                  Start-Sleep -Seconds 1
              } catch {
                  if ($_.Exception.Response.StatusCode -eq 404) {
                      Write-Host "✅ 确认文件已不存在"
                  }
              }
              
          } catch {
              # 即使删除失败也继续尝试上传（降级处理）
              Write-Host "⚠️ 删除操作异常: $($_.Exception.Message)"
              Write-Host "  将继续尝试上传..."
          }
          
          # 6. 创建上传会话（使用最简请求体，完全避免replace语义）
          Write-Host ""
          Write-Host "[6/7] 创建上传会话（纯净请求体）..."
          
          # 构建稳定的上传URL（使用root路径格式）
          $createUrl = "https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodedFolderName}/${encodedIsoName}:/createUploadSession"
          
          Write-Host "使用稳定上传URL:"
          Write-Host "  $createUrl"
          Write-Host ""
          
          $sessionHeaders = @{
              Authorization = "Bearer $uploadToken"
              "Content-Type" = "application/json"
          }
          
          # 最纯净的请求体：空对象，完全避免replace语义
          $bodyJson = @{} | ConvertTo-Json -Compress
          
          Write-Host "请求体（纯净空对象）: $bodyJson"
          Write-Host ""
          
          try {
              Write-Host "正在发送创建上传会话请求..."
              $session = Invoke-RestMethod -Method POST -Uri $createUrl -Headers $sessionHeaders -Body $bodyJson
              
              if (-not $session.uploadUrl) {
                  throw "响应中未找到 uploadUrl"
              }
              
              $uploadSessionUrl = $session.uploadUrl
              Write-Host ""
              Write-Host "✅ 上传会话创建成功！"
              Write-Host "  - 使用稳定路径: /root:/${encodedFolderName}/${encodedIsoName}:"
              Write-Host "  - 使用纯净请求体: {}"
              
              # 7. 执行分片上传
              Write-Host ""
              Write-Host "[7/7] 执行分片上传..."
              
              $chunkSize = 3276800 * 10  # 约31.25MB
              $fileStream = [System.IO.File]::OpenRead($isoPath)
              $totalChunks = [math]::Ceiling($fileSize / $chunkSize)
              $bytesUploaded = 0
              
              Write-Host "  - 分片大小: $([math]::Round($chunkSize / 1MB, 2)) MB"
              Write-Host "  - 总块数: $totalChunks"
              Write-Host ""
              
              for ($i = 0; $i -lt $totalChunks; $i++) {
                  $buffer = New-Object byte[] $chunkSize
                  $bytesRead = $fileStream.Read($buffer, 0, $chunkSize)
                  
                  if ($bytesRead -eq 0) { break }
                  
                  $rangeStart = $bytesUploaded
                  $rangeEnd = $bytesUploaded + $bytesRead - 1
                  $rangeHeader = "bytes $rangeStart-$rangeEnd/$fileSize"
                  
                  $retry = 0
                  $maxRetries = 3
                  $success = $false
                  
                  while (-not $success -and $retry -lt $maxRetries) {
                      try {
                          $request = [System.Net.HttpWebRequest]::Create($uploadSessionUrl)
                          $request.Method = "PUT"
                          $request.ContentType = "application/octet-stream"
                          $request.ContentLength = $bytesRead
                          $request.Headers.Add("Content-Range", $rangeHeader)
                          
                          $requestStream = $request.GetRequestStream()
                          $requestStream.Write($buffer, 0, $bytesRead)
                          $requestStream.Close()
                          
                          # 获取响应，忽略可能的读取错误
                          try {
                              $response = $request.GetResponse()
                              $responseStream = $response.GetResponseStream()
                              $reader = New-Object System.IO.StreamReader($responseStream)
                              $responseContent = $reader.ReadToEnd()
                              $reader.Close()
                              $responseStream.Close()
                              $response.Close()
                          } catch {
                              # 忽略响应读取错误，只要请求成功发送
                          }
                          
                          $progress = [math]::Round(($rangeEnd + 1) / $fileSize * 100, 2)
                          Write-Host "分片 [$($i+1)/$totalChunks]: ✓ 成功 (进度: ${progress}%)"
                          $success = $true
                          
                      } catch {
                          $retry++
                          if ($retry -eq $maxRetries) {
                              Write-Host "分片 [$($i+1)/$totalChunks]: ✗ 失败 - $rangeHeader"
                              Write-Host "  错误: $($_.Exception.Message)"
                              throw "分片上传失败"
                          }
                          Write-Host "分片 [$($i+1)/$totalChunks]: ⚠️ 重试 $retry/$maxRetries (等待 2 秒...)"
                          Start-Sleep -Seconds 2
                      }
                  }
                  
                  $bytesUploaded += $bytesRead
                  
                  # 每上传几个分片后短暂暂停
                  if (($i + 1) % 5 -eq 0) {
                      Start-Sleep -Milliseconds 300
                  }
              }
              
              $fileStream.Close()
              Write-Host ""
              Write-Host "========================================"
              Write-Host "✅ 幂等上传完成！"
              Write-Host "  - 文件: $isoName"
              Write-Host "  - 大小: $([math]::Round($fileSize / 1MB, 2)) MB"
              Write-Host "  - 总块数: $totalChunks"
              Write-Host "  - 策略: 检测→删除→验证→上传"
              Write-Host "  - 请求体: 纯净空对象 {}"
              Write-Host "========================================"
              
          } catch {
              Write-Host ""
              Write-Host "❌ 上传失败: $($_.Exception.Message)"
              
              # 输出详细错误信息
              if ($_.Exception.Response) {
                  try {
                      $errorStream = $_.Exception.Response.GetResponseStream()
                      $reader = New-Object System.IO.StreamReader($errorStream)
                      $errorBody = $reader.ReadToEnd()
                      $reader.Close()
                      $errorStream.Close()
                      
                      Write-Host ""
                      Write-Host "🔴 Graph API 错误响应:"
                      Write-Host $errorBody
                      
                      # 尝试解析错误详情
                      try {
                          $errorObj = $errorBody | ConvertFrom-Json
                          if ($errorObj.error) {
                              Write-Host ""
                              Write-Host "错误详情:"
                              Write-Host "  代码: $($errorObj.error.code)"
                              Write-Host "  消息: $($errorObj.error.message)"
                          }
                      } catch {
                          # 忽略JSON解析错误
                      }
                  } catch {
                      Write-Host "无法读取错误响应流"
                  }
              }
              
              throw
          }

      # =========================
      # 创建 GitHub Release
      # =========================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: pve-${{ env.PVE_VERSION }}-r8125
          name: PVE ${{ env.PVE_VERSION }} with RTL8125
          body: |
            ## Proxmox VE ${{ env.PVE_VERSION }} with RTL8125 Driver
            
            - **PVE 版本**: ${{ env.PVE_VERSION }}
            - **RTL8125 驱动版本**: ${{ env.DRIVER_VERSION }}
            - **SHA256**: `${{ env.SHA256 }}`
            - **文件大小**: ${{ env.ISO_SIZE }} bytes
            
            ### 引导兼容性
            - ✅ Legacy BIOS 引导 (ISOLINUX/GRUB)
            - ✅ UEFI 引导 (GPT)
            - ✅ USB 混合引导 (Hybrid MBR)
            - ✅ 智能引导架构检测
            
            ### 使用说明
            1. 刻录到 USB 设备：`dd if=PVE-${{ env.PVE_VERSION }}-r8125.iso of=/dev/sdX bs=4M status=progress`
            2. 启动安装程序
            3. RTL8125 驱动会自动安装（仅当检测到 RTL8125 硬件时）
            
            ### 注意事项
            - 基于官方 Proxmox VE ${{ env.PVE_VERSION }} ISO 构建
            - 保留原版卷标，避免安装错误
            - 包含动态硬件识别及自动安装配置
          files: |
            ${{ env.ISO_OUTPUT }}
          draft: false
          prerelease: false
          generate_release_notes: false

      # =========================
      # 上传到 GitHub Artifacts
      # =========================
      - name: Upload to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PVE-${{ env.PVE_VERSION }}-R8125-ISO
          path: ${{ env.ISO_OUTPUT }}
          retention-days: 7
          if-no-files-found: error

      # =========================
      # 显示完成信息
      # =========================
      - name: Display Completion Info
        if: success()
        run: |
          echo ""
          echo "========================================"
          echo "✅ 构建完成！"
          echo "========================================"
          echo ""
          echo "📦 输出文件: ${{ env.ISO_OUTPUT }}"
          echo "🏷️  Release Tag: pve-${{ env.PVE_VERSION }}-r8125"
          echo "💾 Artifact: PVE-${{ env.PVE_VERSION }}-R8125-ISO"
          echo "☁️  OneDrive: PVE-Custom-ISO/${{ env.ISO_OUTPUT }}"
          echo ""
          echo "📋 版本信息:"
          echo "  - PVE: ${{ env.PVE_VERSION }}"
          echo "  - RTL8125: ${{ env.DRIVER_VERSION }}"
          echo "  - SHA256: ${{ env.SHA256 }}"
          echo "  - 大小: $(({{ env.ISO_SIZE }}/1024/1024)) MB"
          echo ""
          echo "🔧 引导架构兼容性:"
          echo "  ✅ 智能适配新旧架构"
          echo "  ✅ 兼容 ISOLINUX (旧版)"
          echo "  ✅ 兼容 纯GRUB (新版 PVE 9+)"
          echo "  ✅ USB 混合引导支持 (Hybrid MBR)"
          echo "  ✅ UEFI GPT 引导支持"
          echo ""
          echo "🚀 使用方式:"
          echo "  dd if=${{ env.ISO_OUTPUT }} of=/dev/sdX bs=4M status=progress"
          echo "========================================"

      # =========================
      # 清理临时文件
      # =========================
      - name: Cleanup Temporary Files
        if: always()
        run: |
          echo "清理临时文件..."
          rm -rf work downloads sha256.txt
          # 保留构建的 ISO 用于 Artifact
          if [ -f "$ISO_OUTPUT" ]; then
            echo "保留 ISO 文件: $ISO_OUTPUT"
          fi
