name: Build PVE ISO with RTL8125 (Cloud Only)

on:
  workflow_dispatch:
    inputs:
      proxmox_iso_filename:
        description: 'Proxmox ISO 文件名（在 OneDrive 中）'
        required: true
        default: 'proxmox-ve_9.1-1.iso'
      r8125_driver_filename:
        description: 'RTL8125 驱动文件名（在 OneDrive 中）'
        required: true
        default: 'realtek-r8125-dkms_9.016.01-1_amd64.deb'

permissions:
  contents: write

env:
  OD_CLIENT_ID: ${{ secrets.OD_CLIENT_ID }}
  OD_CLIENT_SECRET: ${{ secrets.OD_CLIENT_SECRET }}
  OD_TENANT_ID: ${{ secrets.OD_TENANT_ID }}
  OD_REFRESH_TOKEN: ${{ secrets.OD_REFRESH_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      # =========================
      # 准备阶段 (完全不变)
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          echo "=== 安装依赖包 ==="
          sudo rm -f /etc/apt/sources.list.d/azure-cli.list /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install -y xorriso curl file jq isolinux
          echo "✅ 依赖安装完成"

      # =========================
      # 获取 OneDrive 驱动和文件夹信息 (完全不变)
      # =========================
      - name: Get OneDrive Drive and Folder Information
        id: get_drive_info
        shell: pwsh
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          Write-Host "=== 获取驱动和文件夹信息 ==="
          $tokenUrl = "https://login.microsoftonline.com/$env:OD_TENANT_ID/oauth2/v2.0/token"
          $body = @{
              client_id     = $env:OD_CLIENT_ID
              client_secret = $env:OD_CLIENT_SECRET
              refresh_token = $env:OD_REFRESH_TOKEN
              grant_type    = "refresh_token"
              scope         = "Files.ReadWrite.All offline_access"
          }
          try {
              $tokenResponse = Invoke-RestMethod -Method Post -Uri $tokenUrl -Body $body -ContentType "application/x-www-form-urlencoded"
              $token = ($tokenResponse.access_token).Trim()
              if ([string]::IsNullOrEmpty($token)) { throw "获取到的访问令牌为空" }
              Write-Host "✓ 访问令牌获取成功"
          } catch { Write-Error "获取访问令牌失败: $_"; throw }
          
          Write-Host "正在获取 Drive ID..."
          try {
              $headers = @{ Authorization = "Bearer $token" }
              $driveInfo = Invoke-RestMethod -Uri "https://graph.microsoft.com/v1.0/me/drive" -Headers $headers -Method GET
              $driveId = $driveInfo.id
              $folderName = "PVE-Custom-ISO"
              Write-Host "✓ 驱动信息获取成功:"
              Write-Host "  - Drive ID: $driveId"
              Write-Host "  - 文件夹名: $folderName"
              "driveId=$driveId" >> $env:GITHUB_OUTPUT
              "folderName=$folderName" >> $env:GITHUB_OUTPUT
          } catch { Write-Error "获取驱动信息失败: $_"; throw }

      # =========================
      # 下载文件 (完全不变)
      # =========================
      - name: Download Files from OneDrive
        shell: pwsh
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          Write-Host "=== 下载文件 ==="
          Write-Host "正在获取下载用的访问令牌..."
          $tokenUrl = "https://login.microsoftonline.com/$env:OD_TENANT_ID/oauth2/v2.0/token"
          $body = @{
              client_id     = $env:OD_CLIENT_ID
              client_secret = $env:OD_CLIENT_SECRET
              refresh_token = $env:OD_REFRESH_TOKEN
              grant_type    = "refresh_token"
              scope         = "Files.ReadWrite.All offline_access"
          }
          $tokenResponse = Invoke-RestMethod -Method Post -Uri $tokenUrl -Body $body -ContentType "application/x-www-form-urlencoded"
          $token = ($tokenResponse.access_token).Trim()
          Write-Host "✓ 下载令牌获取成功"
          
          $downloadDir = "downloads"
          New-Item -ItemType Directory -Path $downloadDir -Force | Out-Null
          $proxmoxIso = "${{ github.event.inputs.proxmox_iso_filename }}"
          $driverFile = "${{ github.event.inputs.r8125_driver_filename }}"
          $files = @($proxmoxIso, $driverFile)
          $headers = @{ Authorization = "Bearer $token" }
          $successCount = 0
          $driveId = "${{ steps.get_drive_info.outputs.driveId }}"
          $folderName = "${{ steps.get_drive_info.outputs.folderName }}"
          
          foreach ($file in $files) {
              $encodedFolderName = [System.Uri]::EscapeDataString($folderName)
              $encodedFileName = [System.Uri]::EscapeDataString($file)
              $downloadUrl = "https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodedFolderName}/${encodedFileName}:/content"
              $outFile = Join-Path $downloadDir $file
              Write-Host "下载: $file"
              try {
                  Invoke-RestMethod -Method GET -Uri $downloadUrl -Headers $headers -OutFile $outFile
                  if (Test-Path $outFile) {
                      $fileSize = (Get-Item $outFile).Length
                      $successCount++
                      if ($file.EndsWith(".iso")) {
                          $sizeMB = $fileSize / 1MB
                          Write-Host "✓ $file ($([math]::Round($sizeMB, 2)) MB)"
                      } else {
                          $sizeKB = $fileSize / 1KB
                          Write-Host "✓ $file ($([math]::Round($sizeKB, 2)) KB)"
                      }
                  }
              } catch {
                  Write-Host "✗ $file - $($_.Exception.Message)"
                  if ($_.Exception.Response.StatusCode -eq 404) {
                      Write-Host "⚠️  错误 404: 找不到文件 '$file'。请检查 PVE-Custom-ISO 文件夹。"
                  }
              }
          }
          if ($successCount -ne $files.Count) { throw "下载完成: $successCount/$($files.Count) 个文件" }
          Write-Host "✓ 所有文件下载成功"
          "ISO_ORIG=downloads/$proxmoxIso" >> $env:GITHUB_ENV
          "DRIVER_FILE=downloads/$driverFile" >> $env:GITHUB_ENV

      # =========================
      # 验证 ISO 文件 (完全不变)
      # =========================
      - name: Verify ISO File
        run: |
          echo "=== 验证 ISO 文件 ==="
          if ! xorriso -indev "$ISO_ORIG" -toc 2>&1 | grep -q "Media summary"; then
            echo "❌ ISO 文件格式不正确或已损坏"
            exit 1
          fi
          echo "✅ ISO 文件验证通过"

      # =========================
      # 解析版本信息 (完全不变)
      # =========================
      - name: Parse Version Information
        run: |
          echo "=== 解析版本信息 ==="
          ISO_BASENAME=$(basename "$ISO_ORIG")
          if [[ "$ISO_BASENAME" =~ proxmox-ve_([0-9]+\.[0-9]+(-[0-9]+)?)\.iso$ ]]; then
            PVE_VERSION="${BASH_REMATCH[1]}"
            echo "PVE_VERSION=$PVE_VERSION" >> $GITHUB_ENV
            echo "ISO_OUTPUT=PVE-${PVE_VERSION}-r8125.iso" >> $GITHUB_ENV
            ORIG_LABEL=$(blkid -o value -s LABEL "$ISO_ORIG")
            if [ -z "$ORIG_LABEL" ]; then
                ORIG_LABEL="PVE-${PVE_VERSION}"
                echo "⚠️  blkid 无法提取卷标，使用默认值: $ORIG_LABEL"
            else
                echo "✅ 成功提取原版卷标: $ORIG_LABEL"
            fi
            ISO_LABEL=$(echo "$ORIG_LABEL" | tr -cd '[:alnum:]_-' | cut -c1-32)
            echo "ISO_LABEL=$ISO_LABEL" >> $GITHUB_ENV
            echo "✅ PVE 版本: $PVE_VERSION"
            echo "✅ 输出文件: $ISO_OUTPUT"
            echo "✅ 卷标: $ISO_LABEL"
          else
            echo "❌ 无法解析 ISO 文件名: $ISO_BASENAME"
            exit 1
          fi
          DRIVER_BASENAME=$(basename "$DRIVER_FILE")
          if [[ "$DRIVER_BASENAME" =~ realtek-r8125-dkms_([^_]+)_amd64\.deb ]]; then
            DRIVER_VERSION="${BASH_REMATCH[1]}"
            echo "DRIVER_VERSION=$DRIVER_VERSION" >> $GITHUB_ENV
            echo "✅ 驱动版本: $DRIVER_VERSION"
          else
            echo "❌ 无法解析驱动文件名: $DRIVER_BASENAME"
            exit 1
          fi

      # =========================
      # 检查并删除现有的GitHub Release (完全不变)
      # =========================
      - name: Check and Delete Existing GitHub Release
        shell: pwsh
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          Write-Host "=== 检查并删除现有的 GitHub Release ==="
          $releaseTag = "pve-${{ env.PVE_VERSION }}-r8125"
          $releaseUrl = "https://api.github.com/repos/${{ github.repository }}/releases/tags/${releaseTag}"
          $authHeader = @{ Authorization = "token ${{ github.token }}" }
          Write-Host "检查 Release: $releaseTag"
          try {
              $releaseInfo = Invoke-RestMethod -Uri $releaseUrl -Headers $authHeader -ErrorAction Stop
              Write-Host "✅ 找到现有的 Release: $($releaseInfo.name)"
              $deleteUrl = "https://api.github.com/repos/${{ github.repository }}/releases/$($releaseInfo.id)"
              Invoke-RestMethod -Uri $deleteUrl -Headers $authHeader -Method DELETE
              Write-Host "✅ 已删除现有的 Release"
              $tagUrl = "https://api.github.com/repos/${{ github.repository }}/git/refs/tags/${releaseTag}"
              try {
                  Invoke-RestMethod -Uri $tagUrl -Headers $authHeader -Method DELETE
                  Write-Host "✅ 已删除现有的 Git Tag"
              } catch { Write-Host "⚠️ 删除 Git Tag 失败: $($_.Exception.Message)" }
          } catch {
              if ($_.Exception.Response.StatusCode -eq 404) { Write-Host "✅ Release 不存在，无需删除" }
              else { Write-Host "⚠️ 检查 Release 失败: $($_.Exception.Message)" }
          }

      # =========================
      # 【核心修改】构建自定义 ISO
      # =========================
      - name: Build Custom ISO
        run: |
          echo "=== 开始构建自定义 ISO ==="
          rm -rf work && mkdir -p work/iso
          
          # 1. 解包
          xorriso -osirrox on -indev "$ISO_ORIG" -extract / work/iso
          chmod -R +w work/iso

          # 2. 注入包
          mkdir -p work/iso/pool/extras
          cp "$DRIVER_FILE" work/iso/pool/extras/
          cp "$DRIVER_FILE" work/iso/

          # 3. 写入 Preseed (注意这里严格的 EOF 引用)
          PRESEED_FILE="work/iso/preseed.cfg"
          cat > "$PRESEED_FILE" << 'EOF'
# PVE 自动安装配置 - 通用驱动集成版
d-i partman/early_command string debconf-set partman-auto/disk "$(list-devices disk | head -1)"

d-i preseed/late_command string \
    mkdir -p /mnt/search_source; \
    DRIVER_SOURCE_PATH=""; \
    echo "===== 开始搜索 RTL8125 驱动包 =====" > /dev/console; \
    for MOUNT_POINT in /cdrom /media/cdrom /mnt/cdrom /dev/sr0; do \
        if mount $MOUNT_POINT /mnt/search_source 2>/dev/null; then \
            DEB_FILE=$(find /mnt/search_source -type f -name "realtek-r8125-dkms*.deb" 2>/dev/null | head -1); \
            if [ -n "$DEB_FILE" ]; then \
                DRIVER_SOURCE_PATH="$DEB_FILE"; \
                umount /mnt/search_source; break; \
            fi; \
            umount /mnt/search_source; \
        fi; \
    done; \
    if [ -z "$DRIVER_SOURCE_PATH" ]; then \
        for DISK_PARTITION in /dev/sd[a-z][1-9]* /dev/nvme[0-9]n[0-9]p[1-9]* /dev/mmcblk[0-9]p[1-9]*; do \
            if [ -e "$DISK_PARTITION" ]; then \
                if mount "$DISK_PARTITION" /mnt/search_source 2>/dev/null; then \
                    DEB_FILE=$(find /mnt/search_source -type f -name "realtek-r8125-dkms*.deb" 2>/dev/null | head -1); \
                    if [ -n "$DEB_FILE" ]; then \
                        DRIVER_SOURCE_PATH="$DEB_FILE"; \
                        umount /mnt/search_source; break; \
                    fi; \
                    umount /mnt/search_source; \
                fi; \
            fi; \
        done; \
    fi; \
    if [ -n "$DRIVER_SOURCE_PATH" ]; then \
        cp "$DRIVER_SOURCE_PATH" /target/tmp/r8125.driver.deb; \
    fi; \
    in-target sh -c ' \
        echo "blacklist r8169" > /etc/modprobe.d/r8125-blacklist.conf; \
        echo "install r8169 /bin/true" >> /etc/modprobe.d/r8125-blacklist.conf; \
        echo "r8125" >> /etc/modules; \
        if [ -f /tmp/r8125.driver.deb ]; then \
            dpkg --force-depends -i /tmp/r8125.driver.deb; \
            if command -v dkms >/dev/null 2>&1 && [ -d "/lib/modules/$(uname -r)/build" ]; then \
                dkms install r8125 || true; \
            fi; \
        fi; \
        update-initramfs -u -k all; \
    '
EOF

          # 4. 打包
          FULL_ISOLINUX=$(find work/iso -name isolinux.bin 2>/dev/null | head -1)
          FULL_EFI=$(find work/iso -name efi.img 2>/dev/null | head -1)
          if [ -n "$FULL_ISOLINUX" ]; then
            REL_ISOLINUX=${FULL_ISOLINUX#work/iso/}
            HOST_MBR=$(find /usr -name isohdpfx.bin | head -1)
            XORRISO_ARGS="-isohybrid-mbr $HOST_MBR -b $REL_ISOLINUX -c $(dirname "$REL_ISOLINUX")/boot.cat -boot-load-size 4 -boot-info-table -no-emul-boot -eltorito-alt-boot -e ${FULL_EFI#work/iso/} -no-emul-boot -isohybrid-gpt-basdat"
          else
            REL_GRUB_BIOS=$(find work/iso -name eltorito.img 2>/dev/null | head -1 | sed 's|work/iso/||')
            XORRISO_ARGS="-b $REL_GRUB_BIOS -no-emul-boot -boot-load-size 4 -boot-info-table --grub2-boot-info -eltorito-alt-boot -e ${FULL_EFI#work/iso/} -no-emul-boot -isohybrid-gpt-basdat"
          fi
          xorriso -as mkisofs -r -V "$ISO_LABEL" -o "$ISO_OUTPUT" -J -joliet-long $XORRISO_ARGS work/iso
          echo "ISO_SIZE_MB=$(($(stat -c%s "$ISO_OUTPUT")/1048576))" >> $GITHUB_ENV
          echo "SHA256=$(sha256sum "$ISO_OUTPUT" | cut -d' ' -f1)" >> $GITHUB_ENV

      # =========================
      # 幂等上传到 OneDrive (完全不变)
      # =========================
      - name: Upload ISO with Idempotent Strategy
        shell: pwsh
        run: |
          [Console]::OutputEncoding = [System.Text.Encoding]::UTF8
          $OutputEncoding = [System.Text.Encoding]::UTF8
          Write-Host "幂等上传策略开始..."
          $tokenUrl = "https://login.microsoftonline.com/$env:OD_TENANT_ID/oauth2/v2.0/token"
          $body = @{
              client_id     = $env:OD_CLIENT_ID
              client_secret = $env:OD_CLIENT_SECRET
              refresh_token = $env:OD_REFRESH_TOKEN
              grant_type    = "refresh_token"
              scope         = "Files.ReadWrite.All offline_access"
          }
          try {
              $uploadTokenResponse = Invoke-RestMethod -Method Post -Uri $tokenUrl -Body $body -ContentType "application/x-www-form-urlencoded"
              $uploadToken = ($uploadTokenResponse.access_token).Trim()
          } catch { throw "Token获取失败" }
          $isoPath = "${{ env.ISO_OUTPUT }}"
          $isoName = "${{ env.ISO_OUTPUT }}"
          $driveId = "${{ steps.get_drive_info.outputs.driveId }}"
          $folderName = "${{ steps.get_drive_info.outputs.folderName }}"
          $encodedFolderName = [System.Uri]::EscapeDataString($folderName)
          $encodedIsoName = [System.Uri]::EscapeDataString($isoName)
          $fileUrl = "https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodedFolderName}/${encodedIsoName}"
          try { Invoke-RestMethod -Uri $fileUrl -Headers @{ Authorization = "Bearer $uploadToken" } -Method DELETE } catch {}
          Start-Sleep -Seconds 2
          $createUrl = "https://graph.microsoft.com/v1.0/drives/${driveId}/root:/${encodedFolderName}/${encodedIsoName}:/createUploadSession"
          $session = Invoke-RestMethod -Method POST -Uri $createUrl -Headers @{ Authorization = "Bearer $uploadToken"; "Content-Type" = "application/json" } -Body "{}"
          $uploadSessionUrl = $session.uploadUrl
          $chunkSize = 3276800 * 10 
          $fileStream = [System.IO.File]::OpenRead($isoPath)
          $totalSize = $fileStream.Length
          $bytesUploaded = 0
          while ($bytesUploaded -lt $totalSize) {
              $buffer = New-Object byte[] $chunkSize
              $bytesRead = $fileStream.Read($buffer, 0, $chunkSize)
              $rangeEnd = $bytesUploaded + $bytesRead - 1
              $request = [System.Net.HttpWebRequest]::Create($uploadSessionUrl)
              $request.Method = "PUT"
              $request.ContentLength = $bytesRead
              $request.Headers.Add("Content-Range", "bytes $bytesUploaded-$rangeEnd/$totalSize")
              $requestStream = $request.GetRequestStream()
              $requestStream.Write($buffer, 0, $bytesRead)
              $requestStream.Close()
              $request.GetResponse().Close()
              $bytesUploaded += $bytesRead
              Write-Host "Progress: $([math]::Round($bytesUploaded/$totalSize*100, 2))%"
          }
          $fileStream.Close()
          Write-Host "✅ 上传完成"

      # =========================
      # 创建 GitHub Release
      # =========================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: pve-${{ env.PVE_VERSION }}-r8125
          name: PVE ${{ env.PVE_VERSION }} with RTL8125
          body: |
            - **PVE 版本**: ${{ env.PVE_VERSION }}
            - **RTL8125 驱动版本**: ${{ env.DRIVER_VERSION }}
            - **文件大小**: ${{ env.ISO_SIZE_MB }} MB
            - **SHA256**: `${{ env.SHA256 }}`
            
            ## 🔧 核心改进：解决 Ventoy/离线安装问题
            - ✅ **通用驱动搜索**：自动扫描所有磁盘分区，彻底解决通过 **Ventoy** 启动时找不到驱动包的问题。
            - ✅ **黑名单优先**：无论驱动是否成功编译，均会**完全禁用冲突的 `r8169` 驱动**，防止其抢占网卡。
            - ✅ **离线安装友好**：允许在无网络、无内核头文件的环境下完成安装，驱动包会预置在系统中。
            - ✅ **明确的状态日志**：所有安装步骤记录在 `/root/r8125_post_install.log`，便于排查。
            
            ## 🚀 安装说明
            1. **写入U盘**：`dd if=PVE-${{ env.PVE_VERSION }}-r8125.iso of=/dev/sdX bs=4M`
            2. **启动安装**：从U盘启动，正常安装PVE。
            3. **驱动处理**：安装程序将**自动搜索并安装**RTL8125驱动。
            
            ## ⚠️ 重要提示（离线环境必读）
            **在无网络环境下首次启动**：
            - 网卡灯**可能不亮**，这是因为缺少 `pve-headers`，驱动**尚未编译**。
            - **这是正常现象**。系统已配置好黑名单和启动项，**只需联网后执行**：
            ```bash
            apt update && apt install pve-headers
            ```
            **然后重启**，驱动将自动编译并加载，网卡即可正常工作。
            
            ## 📋 安装后验证
            ```bash
            # 检查日志
            cat /root/r8125_post_install.log
            # 检查驱动
            lsmod | grep r8125
            # 检查网卡
            lspci -knn | grep -A2 -i realtek
            ```
          files: |
            ${{ env.ISO_OUTPUT }}
          draft: false
          prerelease: false

      # =========================
      # 上传到 GitHub Artifacts
      # =========================
      - name: Upload to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PVE-${{ env.PVE_VERSION }}-R8125-ISO
          path: ${{ env.ISO_OUTPUT }}
          retention-days: 7

      # =========================
      # 清理临时文件
      # =========================
      - name: Cleanup Temporary Files
        if: always()
        run: rm -rf work downloads sha256.txt
